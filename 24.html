            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;

            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            background-color: #0f172a; /* slate-900 */
            margin: 0;
        }

        .checkerboard-bg {
            background-color: #0f172a;
            background-image:
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%, rgba(255, 255, 255, 0.03)),
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%, rgba(255, 255, 255, 0.03));
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-4px); }
          75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        @keyframes popIn {
            0% { transform: translate(-50%, -40%) scale(0.9); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popUp {
            0% { transform: scale(0.5) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-popup { animation: popUp 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popScale {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-scale { animation: popScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes redAlert {
            0% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); background-color: rgba(239, 68, 68, 0); }
            50% { box-shadow: inset 0 0 0 10px rgba(239, 68, 68, 0.8), inset 0 0 60px rgba(239, 68, 68, 0.5); background-color: rgba(239, 68, 68, 0.15); }
            100% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); background-color: rgba(239, 68, 68, 0); }
        }
        .animate-red-alert { animation: redAlert 1s infinite cubic-bezier(0.4, 0, 0.6, 1); }

        @keyframes comboPopup {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-combo { animation: comboPopup 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes bigComboPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.5) rotate(-5deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.8) rotate(0deg); opacity: 0; }
        }
        .animate-big-combo { animation: bigComboPop 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes scoreFloat {
            0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
            20% { transform: translate(-50%, -15px) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -30px) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -45px) scale(0.8); opacity: 0; }
        }
        .animate-score { animation: scoreFloat 1s ease-out forwards; }

        @keyframes timePlus {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { transform: translateY(-15px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-30px) scale(1); opacity: 0; }
        }
        .animate-time-plus { animation: timePlus 0.8s ease-out forwards; }
    </style>

        const getLang = () => {
            const lang = navigator.language || navigator.userLanguage;
            if (lang.startsWith('ko')) return 'ko';
            if (lang.startsWith('ja')) return 'ja';
            if (lang.startsWith('zh-TW') || lang.startsWith('zh-HK') || lang === 'zh-Hant') return 'zh-TW';
            return 'en'; // 기본 영어
        };

        const t = (key) => {
            const lang = getLang();
            return TRANSLATIONS[lang][key] || TRANSLATIONS['en'][key] || key;
        };

        const OPERATOR_STYLES = {
            '+': 'bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white shadow-lg', 
            '-': 'bg-rose-600 hover:bg-rose-500 border border-rose-400 text-white shadow-lg',     
            '*': 'bg-slate-600 hover:bg-slate-500 border border-slate-400 text-white shadow-lg',   
            '/': 'bg-amber-500 hover:bg-amber-400 border border-amber-300 text-black shadow-lg font-extrabold'
        };
        const OPERATOR_STYLES_INACTIVE = {
            '+': 'bg-slate-800 text-slate-500 border border-slate-700 hover:bg-slate-700 hover:text-slate-300',
            '-': 'bg-slate-800 text-slate-500 border border-slate-700 hover:bg-slate-700 hover:text-slate-300',
            '*': 'bg-slate-800 text-slate-500 border border-slate-700 hover:bg-slate-700 hover:text-slate-300',
            '/': 'bg-slate-800 text-slate-500 border border-slate-700 hover:bg-slate-700 hover:text-slate-300'
        };

        // --- Logic ---
        const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const getRandomSuit = () => SUITS[Math.floor(Math.random() * SUITS.length)];

        const isSolvable = (nums) => {
            if (nums.length === 1) return Math.abs(nums[0] - 24) < 0.000001;
            for (let i = 0; i < nums.length; i++) {
                for (let j = 0; j < nums.length; j++) {
                    if (i === j) continue;
                    const list = [];
                    for (let k = 0; k < nums.length; k++) {
                        if (k !== i && k !== j) list.push(nums[k]);
                    }
                    const a = nums[i];
                    const b = nums[j];
                    const results = [a + b, a - b, b - a, a * b];
                    if (b !== 0 && a % b === 0) results.push(a / b);
                    if (a !== 0 && b % a === 0) results.push(b / a);
                    for (let res of results) {
                        if (isSolvable([...list, res])) return true;
                    }
                }
            }
            return false;
        };

        const isHandValid = (handValues) => {
            const combinations = [[]];
            for (let val of handValues) {
                const newCombs = [];
                combinations.forEach(comb => {
                    if (val === 1) {
                        newCombs.push([...comb, 1]);
                        newCombs.push([...comb, 10]);
                    } else {
                        newCombs.push([...comb, val]);
                    }
                });
                combinations.length = 0;
                combinations.push(...newCombs);
            }
            return combinations.some(comb => isSolvable(comb));
        };

        const generateEasyNumbers = () => {
            const types = ['identity', 'cancel', 'split_sum', 'split_mul'];
            const type = types[Math.floor(Math.random() * types.length)];
            let nums = [];

            const base = Math.random() < 0.5 ? [3, 8] : [4, 6];
            
            if (type === 'identity') {
                nums = [...base, 1, 1];
            } else if (type === 'cancel') {
                const n = getRandomInt(2, 9);
                nums = [...base, n, n];
            } else if (type === 'split_sum') {
                const target = base[1]; 
                const splitA = getRandomInt(1, target - 1);
                const splitB = target - splitA;
                nums = [base[0], splitA, splitB, 1];
            } else if (type === 'split_mul') {
                nums = [2, 3, 4, 1];
            }

            for (let i = nums.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [nums[i], nums[j]] = [nums[j], nums[i]];
            }
            return nums;
        };

        const generateProblem = (targetLevel) => { 
            if (targetLevel === 'T1') return [{ id: 't1-1', value: 3, suit: '♣', display: '3' }, { id: 't1-2', value: 8, suit: '♥', display: '8' }, { id: 't1-3', value: 1, suit: '♠', display: 'A' }, { id: 't1-4', value: 1, suit: '♦', display: 'A' }];
            if (targetLevel === 'T2') return [{ id: 't2-1', value: 4, suit: '♣', display: '4' }, { id: 't2-2', value: 6, suit: '♥', display: '6' }, { id: 't2-3', value: 2, suit: '♠', display: '2' }, { id: 't2-4', value: 2, suit: '♦', display: '2' }];
            if (targetLevel === 'T3') return [{ id: 't3-1', value: 10, suit: '♣', display: '10' }, { id: 't3-2', value: 10, suit: '♥', display: '10' }, { id: 't3-3', value: 2, suit: '♠', display: '2' }, { id: 't3-4', value: 2, suit: '♦', display: '2' }];
            
            let cards = [];
            let attempts = 0;
            const levelNum = typeof targetLevel === 'number' ? targetLevel : 1;

            if (levelNum <= 5) {
                while (attempts < 100) {
                    const values = generateEasyNumbers();
                    if (isHandValid(values)) {
                        cards = values.map((val, index) => ({
                            id: `card-${index}-${Date.now()}`,
                            value: val,
                            suit: getRandomSuit(),
                            display: val === 1 ? 'A' : val.toString()
                        }));
                        return cards;
                    }
                    attempts++;
                }
            }

            attempts = 0;
            while (attempts < 1000) {
                const values = Array.from({ length: 4 }, () => AVAILABLE_NUMBERS[getRandomInt(0, 9)]);
                if (isHandValid(values)) {
                    cards = values.map((val, index) => ({
                        id: `card-${index}-${Date.now()}`,
                        value: val,
                        suit: getRandomSuit(),
                        display: val === 1 ? 'A' : val.toString()
                    }));
                    return cards;
                }
                attempts++;
            }
            
            return [
                { id: '1', value: 8, suit: '♠', display: '8' },
                { id: '2', value: 8, suit: '♥', display: '8' },
                { id: '3', value: 3, suit: '♦', display: '3' },
                { id: '4', value: 1, suit: '♣', display: 'A' }
            ];
        };

        const OPERATOR_FUNCS = { '+': (a, b) => a + b, '-': (a, b) => a - b, '*': (a, b) => a * b, '/': (a, b) => a / b };
        const OPERATOR_PRECEDENCE = { '+': 1, '-': 1, '*': 2, '/': 2 };

        const solve24 = (nums) => {
            if (nums.length === 1) {
                if (Math.abs(nums[0].val - 24) < 0.001) return nums[0].str;
                return null;
            }

            for (let i = 0; i < nums.length; i++) {
                for (let j = 0; j < nums.length; j++) {
                    if (i === j) continue;
                    
                    const list = [];
                    for (let k = 0; k < nums.length; k++) {
                        if (k !== i && k !== j) list.push(nums[k]);
                    }

                    const a = nums[i];
                    const b = nums[j];

                    for (let op of Object.keys(OPERATOR_FUNCS)) {
                        if (op === '/' && (b.val === 0 || a.val % b.val !== 0)) continue;
                        if (op === '-' && a.val < b.val) continue;

                        const newVal = OPERATOR_FUNCS[op](a.val, b.val);
                        const opPrec = OPERATOR_PRECEDENCE[op];
                        
                        let strA = a.str;
                        let strB = b.str;

                        if (a.prec < opPrec) strA = `(${strA})`;
                        if (b.prec < opPrec || (b.prec === opPrec && (op === '-' || op === '/'))) {
                            strB = `(${strB})`;
                        }

                        const newStr = `${strA} ${OPERATOR_DISPLAY[op]} ${strB}`;
                        const res = solve24([...list, { val: newVal, str: newStr, prec: opPrec }]);
                        if (res) return res;
                    }
                }
            }
            return null;
        };

        const getBestSolution = (cards) => {
            const rawValues = cards.map(c => c.value);
            const combinations = [[]];
            
            for (let val of rawValues) {
                const newCombs = [];
                combinations.forEach(comb => {
                    if (val === 1) {
                        newCombs.push([...comb, { val: 1, str: 'A', prec: 3 }]);
                        newCombs.push([...comb, { val: 10, str: 'A', prec: 3 }]);
                    } else {
                        newCombs.push([...comb, { val: val, str: val.toString(), prec: 3 }]);
                    }
                });
                combinations.length = 0;
                combinations.push(...newCombs);
            }

            for (let comb of combinations) {
                const solution = solve24(comb);
                if (solution) return solution;
            }
            return "해답을 찾을 수 없습니다.";
        };

        const getPartialHint = (solution) => {
             if(!solution || solution.length < 5) return solution;
             return solution.substring(0, Math.ceil(solution.length * 0.55)) + '...';
        };

        const getKSTDateString = () => {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const kst = new Date(utc + (9 * 3600000));
            return `${kst.getFullYear()}-${kst.getMonth() + 1}-${kst.getDate()}`;
        };

        const formatTime = (ms) => {
            if (ms < 0) ms = 0;
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const s = (totalSec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const Card = ({ card, onClick, isPlaceholder, className }) => {
            if (isPlaceholder) {
                return (
                    <div className={`border-2 border-dashed border-white/30 flex items-center justify-center bg-white/5 text-xs text-white/50 font-bold backdrop-blur-sm transition-all ${className}`}>
                        빈칸
                    </div>
                );
            }
            return (
                <div 
                    className={`bg-white shadow-xl border-b-4 border-slate-300 flex flex-col items-center justify-center cursor-pointer relative z-10 overflow-hidden active:scale-95 transition-transform text-slate-800 ${className}`}
                    onClick={() => { onClick(); }}
                >
                    <span className="font-black text-3xl sm:text-4xl">{card.display}</span>
                </div>
            );
        };

        function Make24Game() {
            const [nickname, setNickname] = useState('Player');
            const [level, setLevel] = useState(1);
            const [sourceCards, setSourceCards] = useState([]);
            const [slots, setSlots] = useState([null, null, null, null]);
            const [operators, setOperators] = useState(['+', '+', '+']);
            const [startBrackets, setStartBrackets] = useState([0, 0, 0, 0]); 
            const [endBrackets, setEndBrackets] = useState([0, 0, 0, 0]);     
            const [timeLeft, setTimeLeft] = useState(30);
            const [gameState, setGameState] = useState('start'); 
            const [resultMessage, setResultMessage] = useState('');
            const [shake, setShake] = useState(false);
            const [activeOpSelector, setActiveOpSelector] = useState(null); 
            const [solutionStr, setSolutionStr] = useState('');
            const [isPaused, setIsPaused] = useState(false);
            const [streak, setStreak] = useState(0);
            const [comboFlash, setComboFlash] = useState(null);
            
            const [hintsLeft, setHintsLeft] = useState(() => parseInt(localStorage.getItem('make24_hints') || '3', 10));
            const [timeItemsLeft, setTimeItemsLeft] = useState(() => parseInt(localStorage.getItem('make24_timeItems') || '3', 10));
            const [passItemsLeft, setPassItemsLeft] = useState(() => parseInt(localStorage.getItem('make24_passItems') || '3', 10));
            const [showTimePlusEffect, setShowTimePlusEffect] = useState(false);

            const [showShop, setShowShop] = useState(false);
            const [gold, setGold] = useState(() => parseInt(localStorage.getItem('make24_gold') || '1000', 10));
            
            const [score, setScore] = useState(0);
            const [lastScoreGain, setLastScoreGain] = useState(null); 
            const [rankingScores, setRankingScores] = useState([]); 
            const [showRanking, setShowRanking] = useState(false);
            const [isEditingName, setIsEditingName] = useState(false);
            const [tempName, setTempName] = useState('');
            
            const [tutorialStep, setTutorialStep] = useState(0); 
            const [tutorialPhase, setTutorialPhase] = useState(0); 
            const [hintText, setHintText] = useState('');
            const [problemStartTime, setProblemStartTime] = useState(0);

            // --- 클라우드 & 로그인 연동 State ---
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [firebaseApi, setFirebaseApi] = useState(null);

            const [adState, setAdState] = useState(() => {
                const saved = localStorage.getItem('make24_ads');

                if (saved) {

                    } catch(e) {}
                }
                return { date: today, hint: 0, time: 0, pass: 0, energy: 0 };
            });
            const [isWatchingAd, setIsWatchingAd] = useState(false);
            const [adCooldowns, setAdCooldowns] = useState({ energy: 0, hint: 0, time: 0, pass: 0 });

            const isCardUsed = (cardId) => slots.some(s => s && s.id === cardId);

            useEffect(() => {
                const savedName = localStorage.getItem('make24_nickname');
                if (savedName) setNickname(savedName);
            }, []);

            // 실시간 클라우드 데이터베이스 초기화 및 자동 로그인
            useEffect(() => {
                let unsubscribeAuth;
                const setupFirebase = async () => {
                    try {
                        // Babel의 변환을 피하기 위해 우회하여 동적 import 실행
                        const { initializeApp } = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js")')();
                        const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js")')();
                        const { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } = await new Function('return import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")')();
                        
                        setFirebaseApi({ collection, doc, setDoc, getDoc, onSnapshot });

                        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const dbInstance = getFirestore(app);
                        setDb(dbInstance);

                        const initAuth = async () => {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        };
                        await initAuth();

                        unsubscribeAuth = onAuthStateChanged(auth, (u) => setUser(u));
                    } catch (err) {
                        console.error("Cloud DB Init Error", err);
                    }
                };
                setupFirebase();
                return () => { if (unsubscribeAuth) unsubscribeAuth(); };
            }, []);

            // 실시간 랭킹 구독 (Real-time Listener)
            useEffect(() => {
                if (!user || !db || !firebaseApi) return;
                const { collection, onSnapshot } = firebaseApi;
                
                const rankingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'rankings');
                const unsubscribe = onSnapshot(rankingsRef, (snapshot) => {
                    const fetched = [];
                    snapshot.forEach(doc => {
                        fetched.push({ id: doc.id, ...doc.data() });
                    });
                    fetched.sort((a, b) => b.score - a.score);
                    setRankingScores(fetched.slice(0, 50));
                }, (error) => {
                    console.error("Ranking fetch error:", error);
                });

                return () => unsubscribe();
            }, [user, db, firebaseApi]);

            useEffect(() => {
                const checkAdCooldowns = () => {
                    const saved = localStorage.getItem('make24_ad_cooldowns');
                    const cooldownEnds = saved ? JSON.parse(saved) : {};
                    const now = Date.now();
                    const newCooldowns = { energy: 0, hint: 0, time: 0, pass: 0 };
                    
                    ['energy', 'hint', 'time', 'pass'].forEach(type => {
                        const end = cooldownEnds[type] || 0;
                        if (end > now) {
