                                                    <button onClick={updateNickname} className="text-xs bg-blue-600 px-2 py-1 rounded font-bold">저장</button>
                                                </div>
                                            ) : <span className="font-bold text-sm text-slate-200">{nickname}</span>}
                                        </div>
                                        {!isEditingName && <button onClick={() => { setTempName(nickname); setIsEditingName(true); }} className="text-slate-400 p-1 hover:text-blue-400"><Edit2 size={16} /></button>}
                                    </div>
                                </div>
                                <div className="flex border-b border-slate-700">
                                    <div className="flex-1 py-3 text-xs font-bold text-center bg-slate-700 text-yellow-400 border-b-2 border-yellow-400">🏆 종합 점수</div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                    {rankingScores.length === 0 ? <div className="text-center text-xs text-slate-500 py-4">기록 없음</div> : rankingScores.map((rank, idx) => (
                                        <div key={idx} className={`flex justify-between items-center p-2 rounded-lg ${rank.nickname === nickname ? 'bg-blue-900/40 border border-blue-500/30' : 'bg-slate-700/30'}`}>
                                            <div className="flex items-center gap-2"><span className={`font-black w-5 text-center text-xs ${idx < 3 ? 'text-yellow-400' : 'text-slate-500'}`}>{idx + 1}</span><span className="text-xs font-medium text-slate-200">{rank.nickname}</span></div>
                                            <div className="text-right"><div className="font-bold text-xs text-yellow-400">{rank.score}점</div><div className="text-[10px] text-slate-400 font-mono">Lv.{rank.level}</div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 튜토리얼 팝업 박스 (가이드 단계) - 항상 최상단 노출을 위해 분리하여 z-[100] 설정 */}
                    {gameState === 'tutorial' && tutorialPhase === 0 && (
                        <div
                            className="absolute z-[100] w-full max-w-sm px-4 animate-pop pointer-events-auto"
                            style={getGuideBoxStyle(tutorialTexts[tutorialStep].position)}
                            onClick={(e) => e.stopPropagation()}
                        >
                            <div className="bg-slate-800 border-2 border-indigo-500 rounded-2xl p-6 shadow-2xl relative">
                                <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white text-xs font-black px-4 py-1 rounded-full shadow-lg border-2 border-slate-800">
                                    GUIDE {tutorialStep + 1}/7
                                </div>
                                <p className="text-lg font-bold text-white mb-6 whitespace-pre-wrap leading-relaxed mt-2">
                                    {tutorialTexts[tutorialStep].text}
                                </p>
                                <div className="flex justify-between gap-3">
                                    <button 
                                        onClick={() => setTutorialStep(Math.max(0, tutorialStep - 1))}
                                        className={`px-4 py-2 rounded-lg font-bold text-sm ${tutorialStep === 0 ? 'bg-slate-700 text-slate-500' : 'bg-slate-600 text-white hover:bg-slate-500'}`}
                                        disabled={tutorialStep === 0}
                                    >
                                        이전
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (tutorialStep < tutorialTexts.length - 1) {
                                                setTutorialStep(tutorialStep + 1);
                                            } else {
                                                finishTutorialGuide();
                                            }
                                        }}
                                        className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg shadow-lg text-sm"
                                    >
                                        {tutorialStep < tutorialTexts.length - 1 ? '다음' : '연습 시작하기'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Make24Game />);
    </script>
</body>
</html>
