<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>24 만들기 - 회원제 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; margin: 0; overflow: hidden; }
        .checkerboard-bg { background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%), linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%); background-position: 0 0, 20px 20px; background-size: 40px 40px; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="checkerboard-bg text-white h-[100dvh] w-[100dvw] flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCCELb4mV6fQaotFsQtjXp2AxMiiF5dvOI",
            authDomain: "dinogames-f6440.firebaseapp.com",
            projectId: "dinogames-f6440",
            storageBucket: "dinogames-f6440.firebasestorage.app",
            messagingSenderId: "220151125192",
            appId: "1:220151125192:web:65773e921095bea95e81fd",
            measurementId: "G-PSP0TCY595"
        };

        // --- 공용 아이콘 ---
        const Trophy = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 21h8M12 17v4M7 4h10M17 4v6a5 5 0 1 1-10 0V4M5 9v1a10 10 0 0 0 10 10M19 9v1a10 10 0 0 1-10 10M2 5h3M19 5h3"/></svg>;
        const Play = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;

        function Make24Game() {
            const [nickname, setNickname] = useState(localStorage.getItem('make24_nickname') || '');
            const [isNicknameConfirmed, setIsNicknameConfirmed] = useState(!!localStorage.getItem('make24_nickname'));
            const [gameState, setGameState] = useState('start');
            const [score, setScore] = useState(0);
            const [level, setLevel] = useState(1);
            const [energy, setEnergy] = useState(10);
            const [rankingScores, setRankingScores] = useState([]);
            const [showRanking, setShowRanking] = useState(false);
            const [slots, setSlots] = useState([null, null, null, null]);
            const [sourceCards, setSourceCards] = useState([]);

            // Firebase 초기화 및 랭킹 실시간 연동
            useEffect(() => {
                const initFirebase = async () => {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                    const { getFirestore, doc, setDoc, collection, query, orderBy, limit, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");

                    const app = initializeApp(firebaseConfig);
                    const db = getFirestore(app);
                    const auth = getAuth(app);

                    const userCred = await signInAnonymously(auth);
                    const uid = userCred.user.uid;

                    // 전역 저장 함수 정의
                    window.submitScore = async (finalScore, finalLevel) => {
                        if (!nickname) return;
                        await setDoc(doc(db, "make24_rankings", uid), {
                            nickname, score: finalScore, level: finalLevel, date: Date.now(), userId: uid
                        }, { merge: true });
                    };

                    // 랭킹 실시간 감시
                    const q = query(collection(db, "make24_rankings"), orderBy("score", "desc"), limit(20));
                    onSnapshot(q, (snapshot) => {
                        setRankingScores(snapshot.docs.map(d => d.data()));
                    });
                };
                initFirebase();
            }, [nickname]);

            const handleStart = () => {
                if (!nickname.trim()) return alert("닉네임을 입력해주세요!");
                localStorage.setItem('make24_nickname', nickname);
                setIsNicknameConfirmed(true);
                // 게임 시작 로직 (카드 생성 등)
                setSourceCards([{id:1, display:'8', value:8}, {id:2, display:'3', value:3}, {id:3, display:'A', value:1}, {id:4, display:'10', value:10}]);
                setGameState('playing');
            };

            const winGame = () => {
                const newScore = score + 100;
                setScore(newScore);
                if (window.submitScore) window.submitScore(newScore, level); // 랭킹 서버로 전송
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                alert("정답입니다! 점수가 랭킹에 저장되었습니다.");
            };

            return (
                <div className="flex flex-col h-full items-center justify-center p-4">
                    {/* 상단바 */}
                    <div className="absolute top-0 w-full flex justify-between p-6 items-center">
                        <div className="flex flex-col">
                            <span className="text-blue-400 font-black text-xl">{nickname || 'Guest'}</span>
                            <span className="text-yellow-400 font-bold">Score: {score}</span>
                        </div>
                        <button onClick={() => setShowRanking(true)} className="p-3 bg-slate-800 rounded-full text-yellow-400 shadow-xl border border-slate-700">
                            <Trophy />
                        </button>
                    </div>

                    {!isNicknameConfirmed ? (
                        /* 닉네임 설정 화면 */
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl w-full max-w-sm animate-pop text-center">
                            <h2 className="text-2xl font-black mb-6 text-emerald-400">닉네임을 정해주세요!</h2>
                            <input 
                                type="text" 
                                value={nickname} 
                                onChange={(e) => setNickname(e.target.value)}
                                className="w-full bg-slate-900 border-2 border-slate-600 rounded-xl px-4 py-3 mb-6 text-center text-xl font-bold focus:border-blue-500 outline-none"
                                placeholder="최대 8자"
                                maxLength={8}
                            />
                            <button onClick={handleStart} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl text-xl font-black shadow-lg flex justify-center items-center gap-2">
                                <Play /> 게임 시작하기
                            </button>
                        </div>
                    ) : (
                        /* 게임 플레이 화면 (간략화) */
                        <div className="text-center animate-pop">
                            <h1 className="text-4xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">24 만들기</h1>
                            <div className="flex gap-4 mb-10 justify-center">
                                {sourceCards.map(c => <div key={c.id} className="w-16 h-20 bg-white text-slate-900 rounded-xl flex items-center justify-center text-3xl font-black shadow-2xl">{c.display}</div>)}
                            </div>
                            <button onClick={winGame} className="px-10 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-xl font-black shadow-xl">테스트: 정답 맞추기!</button>
                        </div>
                    )}

                    {/* 랭킹 팝업 */}
                    {showRanking && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setShowRanking(false)}>
                            <div className="bg-slate-800 w-full max-w-sm rounded-3xl border border-slate-700 overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="p-6 bg-slate-700 flex justify-between items-center">
                                    <h2 className="text-xl font-black text-yellow-400 flex items-center gap-2"><Trophy /> 전 세계 랭킹</h2>
                                    <button onClick={() => setShowRanking(false)} className="text-slate-400 text-2xl">×</button>
                                </div>
                                <div className="p-4 max-h-[60vh] overflow-y-auto space-y-2">
                                    {rankingScores.length > 0 ? rankingScores.map((r, i) => (
                                        <div key={i} className={`flex justify-between p-4 rounded-xl ${r.nickname === nickname ? 'bg-blue-900/50 border border-blue-500' : 'bg-slate-900/50'}`}>
                                            <span className="font-bold">{i+1}. {r.nickname}</span>
                                            <span className="text-yellow-400 font-black">{r.score.toLocaleString()}</span>
                                        </div>
                                    )) : <div className="text-center py-10 text-slate-500">기록 로딩 중...</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Make24Game />);
    </script>
</body>
</html>
