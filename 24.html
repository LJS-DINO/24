                        }
                    });

                    setAdCooldowns(prev => {
                        if (prev.energy === newCooldowns.energy && prev.hint === newCooldowns.hint && prev.time === newCooldowns.time && prev.pass === newCooldowns.pass) {
                            return prev;
                        }
                        return newCooldowns;
                    });
                };
                checkAdCooldowns();
                const interval = setInterval(checkAdCooldowns, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                localStorage.setItem('make24_ads', JSON.stringify(adState));
            }, [adState]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const today = getKSTDateString();
                    if (adState.date !== today) {
                        setAdState({ date: today, hint: 0, time: 0, pass: 0, energy: 0 });
                    }
                }, 10000);
                return () => clearInterval(interval);
            }, [adState.date]);

            useEffect(() => {
                const calculateEnergy = () => {
                    let currentEnergy = parseInt(localStorage.getItem('make24_energy') ?? MAX_ENERGY.toString(), 10);
                    let lastTime = parseInt(localStorage.getItem('make24_energy_time') || Date.now().toString(), 10);

                    if (currentEnergy < MAX_ENERGY) {
                        const now = Date.now();
                        const diff = now - lastTime;
                        if (diff >= RECHARGE_TIME_MS) {
                            const gained = Math.floor(diff / RECHARGE_TIME_MS);
                            currentEnergy = Math.min(MAX_ENERGY, currentEnergy + gained);
                            lastTime = lastTime + (gained * RECHARGE_TIME_MS);
                            
                            setEnergy(currentEnergy);
                            setLastEnergyTime(lastTime);
                            localStorage.setItem('make24_energy', currentEnergy.toString());
                            localStorage.setItem('make24_energy_time', lastTime.toString());
                        }
                        
                        if (currentEnergy < MAX_ENERGY) {
                            setTimeToNextEnergy(RECHARGE_TIME_MS - (Date.now() - lastTime));
                        } else {
                            setTimeToNextEnergy(0);
                        }
                    } else {
                        // 행동력이 10 이상일 때는 초과분을 강제로 깎지 않고 시간 갱신만 수행
                        setLastEnergyTime(Date.now());
                        localStorage.setItem('make24_energy_time', Date.now().toString());
                        setTimeToNextEnergy(0);
                    }
                };

                calculateEnergy();
                const interval = setInterval(calculateEnergy, 1000);
                return () => clearInterval(interval);
            }, [energy]);

            useEffect(() => {
                localStorage.setItem('make24_gold', gold.toString());
                localStorage.setItem('make24_hints', hintsLeft.toString());
                localStorage.setItem('make24_timeItems', timeItemsLeft.toString());
                localStorage.setItem('make24_passItems', passItemsLeft.toString());
            }, [gold, hintsLeft, timeItemsLeft, passItemsLeft]);

            const saveRecord = async (finalScore, currentLevel) => {
                if (!user || !db || !firebaseApi) return;
                const { doc, setDoc, getDoc } = firebaseApi;
                
                const date = Date.now();
                const userRankRef = doc(db, 'artifacts', appId, 'public', 'data', 'rankings', user.uid);
                
                try {
                    const docSnap = await getDoc(userRankRef);
                    if (docSnap.exists()) {
                        if (docSnap.data().score >= finalScore) return; 
                    }
                    await setDoc(userRankRef, {
                        nickname: nickname,
                        level: currentLevel,
                        score: finalScore,
                        date: date,
                        userId: user.uid
                    }, { merge: true });
                } catch(e) {
                    console.error("Save record error:", e);
                }
            };

            const updateNickname = async () => {
                if (tempName.trim()) {
                    const newName = tempName.trim();
                    setNickname(newName);
                    localStorage.setItem('make24_nickname', newName);
                    setIsEditingName(false);

                    // 온라인 랭킹 닉네임 즉시 업데이트 반영
                    if (user && db && firebaseApi && score > 0) {
                        const { doc, setDoc, getDoc } = firebaseApi;
                        const userRankRef = doc(db, 'artifacts', appId, 'public', 'data', 'rankings', user.uid);
                        try {
                            const docSnap = await getDoc(userRankRef);
                            if (docSnap.exists()) {
                                await setDoc(userRankRef, { nickname: newName }, { merge: true });
                            }
                        } catch(e) {}
                    }
                }
            };

            const startLevel = useCallback((targetLevel, free = false) => {
                const isTutorial = typeof targetLevel === 'string' && targetLevel.startsWith('T');
                
                if (!isTutorial && !free) {
                    let currentEnergy = parseInt(localStorage.getItem('make24_energy') ?? MAX_ENERGY.toString(), 10);
                    let lastTime = parseInt(localStorage.getItem('make24_energy_time') || Date.now().toString(), 10);
                    if (currentEnergy < 1) {
                        setResultMessage(t('not_enough_energy') + "!");
                        setShake(true);
                        setTimeout(() => setShake(false), 500);
                        return false;
                    }
                    const newEnergy = currentEnergy - 1;
                    const newLastTime = currentEnergy >= MAX_ENERGY ? Date.now() : lastTime;
                    
                    setEnergy(newEnergy);
                    setLastEnergyTime(newLastTime);
                    localStorage.setItem('make24_energy', newEnergy.toString());
                    localStorage.setItem('make24_energy_time', newLastTime.toString());
                    
                    if (currentEnergy >= MAX_ENERGY && newEnergy < MAX_ENERGY) {
                        setTimeToNextEnergy(RECHARGE_TIME_MS);
                    }
                }

                setSourceCards(generateProblem(targetLevel));
                setLevel(targetLevel);
                setSlots([null, null, null, null]);
                setOperators(['+', '+', '+']);
                setStartBrackets([0, 0, 0, 0]);
                setEndBrackets([0, 0, 0, 0]);
                setTimeLeft(isTutorial ? 999 : 30);
                setGameState(isTutorial ? 'tutorial' : 'playing');
                setResultMessage('');
                setSolutionStr('');
                setHintText('');
                setActiveOpSelector(null);
                setProblemStartTime(Date.now());
                setIsPaused(false);
                setLastScoreGain(null);
                
                if (isTutorial) {
                   const phaseStr = targetLevel.substring(1);
                   if(phaseStr) setTutorialPhase(parseInt(phaseStr));
                }
                return true;
            }, []);

            const startTutorial = () => {
                setGameState('tutorial');
                setTutorialStep(0);
                setTutorialPhase(0);
                setSourceCards(generateProblem('T1')); 
                setLevel('T');
            };

            const finishTutorialGuide = () => {
                setTutorialStep(0);
                setTutorialPhase(1); 
                startLevel('T1');
            };

            const initGame = useCallback(() => {
                const hasCompleted = localStorage.getItem('make24_tutorial_done');
                if (!hasCompleted) {
                    startTutorial();
                } else {
                    const savedLevel = parseInt(localStorage.getItem('make24_level') || '1', 10);
                    if (startLevel(savedLevel)) {
                        setScore(0);
                        setStreak(0);
                        setComboFlash(null);
                    }
                }
            }, [startLevel]);

            const nextLevel = () => {
                if (gameState === 'tutorial' || (typeof level === 'string' && level.startsWith('T'))) {
                    if (tutorialPhase > 0 && tutorialPhase < 3) {
                         startLevel(`T${tutorialPhase + 1}`);
                    } else if (tutorialPhase === 3) {
                         localStorage.setItem('make24_tutorial_done', 'true');
                         setGameState('tutorial_complete');
                    }
                    return;
                }
                const nextLv = level + 1;
                // 다음 문제로 넘어갈 때는 행동력을 소모하지 않도록 true 플래그 전달
                if (startLevel(nextLv, true)) {
                    localStorage.setItem('make24_level', nextLv.toString());
                }
            };

            const retryLevel = () => {
                if (startLevel(level)) {
                    setStreak(0);
                    setComboFlash(null);
                }
            };

            const useHint = () => {
                if (hintsLeft > 0 && gameState === 'playing' && !isPaused) {
                    const answer = getBestSolution(sourceCards);
                    setHintText(getPartialHint(answer));
                    setHintsLeft(prev => prev - 1);
                } else if (hintsLeft === 0) {
                    setResultMessage(t('hint_empty'));
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            const useTimeItem = () => {
                if (timeItemsLeft > 0 && gameState === 'playing' && !isPaused) {
                    setTimeItemsLeft(prev => prev - 1);
                    setTimeLeft(prev => prev + 10);
                    setShowTimePlusEffect(true);
                    setTimeout(() => setShowTimePlusEffect(false), 800);
                    setResultMessage(t('time_added'));
                } else if (timeItemsLeft === 0) {
                    setResultMessage(t('time_empty'));
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            const usePassItem = () => {
                if (passItemsLeft > 0 && gameState === 'playing' && !isPaused) {
                    setPassItemsLeft(prev => prev - 1);
                    setResultMessage(t('pass_used'));
                    setTimeout(() => startLevel(level, true), 500); 
                } else if (passItemsLeft === 0) {
                    setResultMessage(t('pass_empty'));
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            const goToLobby = () => {
                if (score > 0) saveRecord(score, level);
                setIsPaused(false);
                setGameState('start');
            };

            const buyItem = (type, cost) => {
                if (gold >= cost) {
                    setGold(prev => prev - cost);
                    if (type === 'hint') setHintsLeft(prev => prev + 3);
                    if (type === 'time') setTimeItemsLeft(prev => prev + 3);
                    if (type === 'pass') setPassItemsLeft(prev => prev + 3);
                }
            };

            const watchAd = (type) => {
                const maxViews = type === 'energy' ? 5 : 3;
                if (adState[type] >= maxViews) return;
                if (adCooldowns[type] > 0) return;

                setIsWatchingAd(true);
                // 광고 시청 시뮬레이션 (1.5초)
                setTimeout(() => {
                    setIsWatchingAd(false);
                    
                    // 각 구좌별 1분 쿨타임 개별 설정
                    const saved = localStorage.getItem('make24_ad_cooldowns');
                    const cooldownEnds = saved ? JSON.parse(saved) : {};
                    cooldownEnds[type] = Date.now() + 60 * 1000;
                    localStorage.setItem('make24_ad_cooldowns', JSON.stringify(cooldownEnds));

                    setAdState(prev => {
                        const today = getKSTDateString();
                        if (prev.date !== today) {
                             return { date: today, hint: 0, time: 0, pass: 0, energy: 0, [type]: 1 };
                        }
                        return { ...prev, [type]: prev[type] + 1 };
                    });
                    
                    if (type === 'hint') setHintsLeft(p => p + 3);
                    if (type === 'time') setTimeItemsLeft(p => p + 3);
                    if (type === 'pass') setPassItemsLeft(p => p + 3);
                    if (type === 'energy') {
                        setEnergy(p => {
                            const newE = p + 3;
                            localStorage.setItem('make24_energy', newE.toString());
                            return newE;
                        });
                    }
                }, 1500);
            };

            useEffect(() => {
                let timer;
                const isTutorialGuide = gameState === 'tutorial' && tutorialPhase === 0;
                
                if ((gameState === 'playing' || (gameState === 'tutorial' && !isTutorialGuide)) && !isPaused) {
                    timer = setInterval(() => {
                        setTimeLeft((prev) => {
                            if (prev <= 1) {
                                if (gameState === 'tutorial') return 999;
                                const answer = getBestSolution(sourceCards);
                                setSolutionStr(answer);
                                setGameState('fail');
                                setStreak(0);
                                setComboFlash(null);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [gameState, isPaused, sourceCards, tutorialPhase]);

            const handleSourceCardClick = (card) => {
                if (gameState === 'tutorial' && tutorialPhase === 0) return;
                if (gameState !== 'playing' && gameState !== 'tutorial') return;
                if (isPaused) return;
                
                const emptySlotIdx = slots.indexOf(null);
                if (emptySlotIdx !== -1) {
                    const newSlots = [...slots];
                    newSlots[emptySlotIdx] = card;
                    setSlots(newSlots);
                } else {
                    setResultMessage(t('slots_full'));
                    setTimeout(() => setResultMessage(""), 1000);
                }
            };

            const handleSlotCardClick = (index) => {
                if (gameState === 'tutorial' && tutorialPhase === 0) return;
                if (gameState !== 'playing' && gameState !== 'tutorial') return;
                if (isPaused) return;
                
                if (slots[index]) {
                    const newSlots = [...slots];
                    newSlots[index] = null;
                    setSlots(newSlots);
                }
            };

            const toggleStartBracket = (idx) => {
                if (gameState === 'tutorial' && tutorialPhase === 0) return;
                if (gameState !== 'playing' && gameState !== 'tutorial') return;
                if (isPaused) return;
                const newBrackets = [...startBrackets];
                newBrackets[idx] = (newBrackets[idx] + 1) % 3;
                setStartBrackets(newBrackets);
            };

            const toggleEndBracket = (idx) => {
                if (gameState === 'tutorial' && tutorialPhase === 0) return;
                if (gameState !== 'playing' && gameState !== 'tutorial') return;
                if (isPaused) return;
                const newBrackets = [...endBrackets];
                newBrackets[idx] = (newBrackets[idx] + 1) % 3;
                setEndBrackets(newBrackets);
            };

            const selectOperator = (idx, op) => {
                if (gameState === 'tutorial' && tutorialPhase === 0) return;
                if (gameState !== 'playing' && gameState !== 'tutorial') return;
                if (isPaused) return;
                const newOps = [...operators];
                newOps[idx] = op;
                setOperators(newOps);
                setActiveOpSelector(null);
            };

            const triggerConfetti = () => {
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                }
            };

            const calculateScore = (timeTaken, currentStreak) => {
                let basePoints = timeTaken <= 10000 ? 3 : timeTaken <= 20000 ? 2 : 1;
                let multiplier = currentStreak > 50 ? 10 : currentStreak >= 31 ? 8 : currentStreak >= 21 ? 4 : currentStreak >= 10 ? 2 : 1;
                return { base: basePoints, multiplier, total: basePoints * multiplier };
            };

            const checkResult = () => {
                if (slots.some(s => s === null)) {
                    setResultMessage(t('place_cards'));
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                    return;
                }
                const cardOptions = slots.map(c => c.value === 1 ? [1, 10] : [c.value]); 
                let possibleValueSets = [[]];
                for (let options of cardOptions) {
                    const next = [];
                    for (let prev of possibleValueSets) {
                        for (let opt of options) { next.push([...prev, opt]); }
                    }
                    possibleValueSets = next;
                }
                let solved = false;
                let winningExpression = "";
                let lastError = null;
                for (let values of possibleValueSets) {
                    let expression = "";
                    for(let i=0; i<4; i++) {
                        if (startBrackets[i] > 0) expression += "(".repeat(startBrackets[i]);
                        expression += values[i];
                        if (endBrackets[i] > 0) expression += ")".repeat(endBrackets[i]);
                        if (i < 3) expression += ` ${operators[i]} `;
                    }
                    try {
                        const result = new Function(`return ${expression}`)();
                        if (Math.abs(result - 24) < 0.0001) {
                            solved = true;
                            let displayExp = "";
                            for(let i=0; i<4; i++) {
                                if (startBrackets[i] > 0) displayExp += "(".repeat(startBrackets[i]);
                                displayExp += values[i];
                                if (endBrackets[i] > 0) displayExp += ")".repeat(endBrackets[i]);
                                if(i < 3) displayExp += ` ${OPERATOR_DISPLAY[operators[i]]} `;
                            }
                            winningExpression = displayExp;
                            break;
                        }
                    } catch (e) { lastError = t('check_brackets'); }
                }

                if (solved) {
                    const now = Date.now();
                    const solveDuration = now - problemStartTime;
                    
                    if (gameState === 'tutorial') {
                        setGameState('success');
                        if (tutorialPhase === 1) setResultMessage(t('tut_msg_1'));
                        else if (tutorialPhase === 2) setResultMessage(t('tut_msg_2'));
                        else setResultMessage(t('tut_msg_3'));
                        triggerConfetti();
                        return;
                    }

                    const nextStreak = streak + 1;
                    const scoreInfo = calculateScore(solveDuration, nextStreak);
                    const newTotalScore = score + scoreInfo.total;
                    
                    setScore(newTotalScore);
                    setGold(prev => prev + 10 + Math.min(nextStreak, 5));
                    
                    saveRecord(newTotalScore, level);

                    setLastScoreGain(scoreInfo);
                    setStreak(nextStreak);
                    if (nextStreak > 1) {
                        setComboFlash(nextStreak);
                        setTimeout(() => setComboFlash(null), 1200);
                    }

                    setGameState('success');
                    setResultMessage(`${t('correct')} (${winningExpression} = 24)`);
                    triggerConfetti();
                } else {
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                    setResultMessage(lastError || t('wrong_answer'));
                    setStreak(0);
                    setComboFlash(null);
                }
            };

            const tutorialTexts = [
                { text: t('tut_step_1'), focus: "deck", position: "bottom" },
                { text: t('tut_step_2'), focus: "slot", position: "top" },
                { text: t('tut_step_3'), focus: "slot", position: "top" },
                { text: t('tut_step_4'), focus: "items", position: "top" },
                { text: t('tut_step_5'), focus: "item-time", position: "top" },
                { text: t('tut_step_6'), focus: "item-hint", position: "top" },
                { text: t('tut_step_7'), focus: "item-pass", position: "top" }
            ];

            const getGuideBoxStyle = (pos) => {
                if (pos === 'top') return { top: '20%', left: '50%', transform: 'translate(-50%, 0)' };
                if (pos === 'bottom') return { bottom: '5%', left: '50%', transform: 'translate(-50%, 0)' };
                return { top: '50%', left: '50%', transform: 'translate(-50%, -50%)' };
            };

            // vw 기반 반응형 카드 사이즈 (심플 디자인에 맞게 축소)
            const deckCardClass = "w-[14vw] max-w-[3.5rem] h-[18vw] max-h-[4.5rem] rounded-xl";
            const slotCardClass = "w-[14vw] max-w-[3.5rem] h-[18vw] max-h-[4.5rem] rounded-xl";

            return (
                <div className={`flex flex-col h-full bg-slate-900 overflow-hidden relative transition-all duration-300`}>
                    {/* 상단 헤더 - 글씨 크기 및 여백 대폭 확대 */}
                    <div className="flex-none px-3 sm:px-4 py-3 bg-slate-800 border-b border-slate-700 flex justify-between items-center z-30 shadow-lg min-h-[80px]">
                         <div className="flex items-center gap-3 shrink-0">
                            <div className="flex flex-col items-center justify-center">
                                <span className="text-[10px] text-slate-400 font-bold tracking-widest mb-0.5">{t('level')}</span>
                                <span className="text-2xl sm:text-3xl font-black text-blue-400 leading-none">{level.toString().startsWith('T') ? level : level}</span>
                            </div>
                            <div className="flex flex-col items-center justify-center bg-slate-900/80 rounded-xl px-3 py-1.5 border border-slate-700/50 shadow-inner min-w-[3.5rem]">
                                <div className="flex items-center gap-1.5">
                                    <Heart size={16} className="text-rose-500 fill-rose-500" />
                                    <span className="text-sm sm:text-base font-black text-white leading-none mt-0.5">{energy}</span>
                                </div>
                                {energy < MAX_ENERGY && (
                                    <span className="text-[10px] sm:text-xs text-rose-300 font-mono mt-1 font-bold leading-none tracking-tighter">{formatTime(timeToNextEnergy)}</span>
                                )}
                            </div>
                         </div>
                        <div className="flex-1 flex justify-center items-center gap-3 sm:gap-5">
                            <div className="flex flex-col items-end justify-center relative w-auto min-w-[2.5rem]">
                                <span className="text-[10px] text-slate-400 font-bold tracking-widest mb-0.5 hidden sm:block">{t('score')}</span>
                                <span className="text-2xl sm:text-3xl font-black text-yellow-400 leading-none">{score.toLocaleString()}</span>
                                {lastScoreGain && <span className="text-xs font-bold text-emerald-400 animate-score absolute top-8 right-0 pointer-events-none whitespace-nowrap">+{lastScoreGain.total}</span>}
                            </div>
                            <div className={`flex items-center justify-center gap-2 px-3 py-2 sm:px-4 rounded-3xl bg-slate-900 border-2 transition-all duration-300 ${timeLeft <= 10 ? 'border-red-500 text-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'border-slate-600 text-emerald-400 shadow-inner'}`}>
                                <Timer size={20} />
                                <span className="text-3xl sm:text-4xl font-black font-mono tracking-wider w-12 sm:w-16 text-center leading-none mt-0.5">
                                    {level.toString().startsWith('T') ? '∞' : timeLeft}
                                </span>
                                {showTimePlusEffect && <span className="absolute text-emerald-400 font-black text-xl animate-time-plus ml-16">+10s</span>}
                            </div>
                            <div className="flex flex-col items-start justify-center w-auto min-w-[2.5rem]">
                                <span className="text-[10px] text-slate-400 font-bold tracking-widest mb-0.5 hidden sm:block">{t('combo')}</span>
                                <div className={`flex items-baseline gap-0.5 font-black ${streak > 0 ? 'text-orange-500' : 'text-slate-600'}`}>
                                    <span className="text-2xl sm:text-3xl leading-none">{streak}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center justify-end shrink-0">
                            {gameState === 'playing' || gameState === 'tutorial' || gameState === 'fail' ? (
                                <button onClick={() => setIsPaused(true)} className="p-3 bg-slate-700 active:bg-slate-600 rounded-full text-white shadow-lg border border-slate-600 transition-transform active:scale-95">
                                    <Pause size={22} />
                                </button>
                            ) : (
                                <button onClick={() => setShowRanking(true)} className="p-3 bg-slate-700 active:bg-slate-600 rounded-full text-yellow-400 shadow-lg border border-slate-600 transition-transform active:scale-95">
                                    <Trophy size={22} />
                                </button>
                            )}
                        </div>
                    </div>

                    {/* 백그라운드 클릭용 오버레이 (연산자 팝업 닫기 등) - z-index를 35로 낮춤 */}
                    {(activeOpSelector !== null) && (
                        <div className="fixed inset-0 z-[35]" onClick={() => setActiveOpSelector(null)} />
                    )}

                    {/* 게임 오버레이/팝업 영역 */}
                    {/* 시간이 10초 이하일 때 뜨는 붉은색 경고 효과 (z-index 및 CSS 효과 대폭 상향 적용) */}
                    {gameState === 'playing' && timeLeft <= 10 && !isPaused && <div className="absolute inset-0 pointer-events-none z-[60] animate-red-alert" />}
                    
                    {gameState === 'tutorial' && tutorialPhase === 0 && <div className="absolute inset-0 z-[60] bg-black/60" onClick={(e) => e.stopPropagation()} />}
                    
                    {gameState === 'tutorial_complete' && (
                        <div className="absolute inset-0 z-[80] bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center animate-pop-scale">
                            <div className="bg-slate-800 border-2 border-emerald-500 rounded-3xl p-8 max-w-sm shadow-2xl w-full">
                                <h2 className="text-2xl font-black text-emerald-400 mb-4">{t('tutorial_complete')}</h2>
                                <p className="text-base text-slate-200 mb-8 leading-relaxed">{t('tutorial_done_desc1')}<br/><b>{t('tutorial_done_desc2')}</b></p>
                                <button onClick={() => { setGameState('start'); initGame(); }} className="w-full py-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-2">
                                    <Play size={20} fill="currentColor" /> {t('start_main_game')}
                                </button>
                            </div>
                        </div>
                    )}

                    {isPaused && (
                        <div className="absolute inset-0 z-[80] bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center gap-8 animate-pop-scale p-4">
                            <h2 className="text-4xl font-black text-white tracking-widest drop-shadow-lg">{t('paused')}</h2>
                            <div className="flex flex-col gap-4 w-full max-w-xs">
                                <button onClick={() => setIsPaused(false)} className="w-full py-3.5 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-3">
                                    <Play size={20} fill="currentColor" /> {gameState === 'fail' ? t('view_result') : t('continue')}
                                </button>
                                <button onClick={retryLevel} disabled={energy < 1} className={`w-full py-3.5 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-3 border border-slate-600 ${energy >= 1 ? 'bg-slate-700 hover:bg-slate-600 active:bg-slate-500' : 'bg-slate-800 opacity-50 cursor-not-allowed'}`}>
                                    <RotateCcw size={20} /> {energy >= 1 ? t('retry') : t('not_enough_energy')}
                                </button>
                                <button onClick={goToLobby} className="w-full py-3.5 bg-rose-700 hover:bg-rose-600 active:bg-rose-500 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-3 border border-rose-600">
                                    <Home size={20} /> {t('exit_lobby')}
                                </button>
                            </div>
                        </div>
                    )}

                    {showShop && (
                        <div className="absolute inset-0 z-[80] bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center p-4 animate-pop-scale">
                            <div className="w-full max-w-sm bg-slate-800 rounded-3xl shadow-2xl border border-slate-600 flex flex-col max-h-[85vh]">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center">
                                    <div className="flex items-center gap-2"><ShoppingBag className="text-indigo-400" size={20} /><h2 className="text-lg font-bold">{t('item_shop')}</h2></div>
                                    <button onClick={() => setShowShop(false)} className="text-slate-400 p-1 hover:text-white"><CloseIcon size={20} /></button>
                                </div>
                                <div className="p-3 bg-slate-900/50 flex justify-center items-center border-b border-slate-700">
                                    <div className="flex items-center gap-2"><Coins className="text-yellow-400" size={18} /><span className="font-bold text-yellow-400">{gold.toLocaleString()}</span></div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                    <div className="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2.5 bg-rose-500 rounded-lg"><Heart size={20} className="text-white fill-white"/></div>
                                            <div><div className="font-bold text-sm">{t('energy_x3')}</div><div className="text-[10px] text-slate-400">{t('get_by_ad')}</div></div>
                                        </div>
                                        <div className="flex items-center gap-1.5 sm:gap-2">
                                            <button onClick={() => watchAd('energy')} disabled={adState.energy >= 5 || adCooldowns.energy > 0} className={`px-4 py-1.5 rounded-lg font-bold text-xs flex items-center gap-1.5 transition-colors ${adState.energy < 5 && adCooldowns.energy === 0 ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-md' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`}>
                                                <VideoIcon size={14} className={adState.energy < 5 && adCooldowns.energy === 0 ? "text-blue-200" : "text-slate-400"} /> 
                                                {adCooldowns.energy > 0 ? `${adCooldowns.energy}${t('wait_sec')}` : `${5 - adState.energy}/5`}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2.5 bg-yellow-600 rounded-lg"><Lightbulb size={20} className="text-white"/></div>
                                            <div><div className="font-bold text-sm">{t('hint_x3')}</div><div className="text-[10px] text-slate-400">{t('hint_desc')}</div></div>
                                        </div>
                                        <div className="flex items-center gap-1.5 sm:gap-2">
                                            <button onClick={() => watchAd('hint')} disabled={adState.hint >= 3 || adCooldowns.hint > 0} className={`px-2 py-1.5 rounded-lg font-bold text-xs flex items-center gap-1 transition-colors ${adState.hint < 3 && adCooldowns.hint === 0 ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-md' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`}>
                                                <VideoIcon size={14} className={adState.hint < 3 && adCooldowns.hint === 0 ? "text-blue-200" : "text-slate-400"} /> 
                                                {adCooldowns.hint > 0 ? `${adCooldowns.hint}s` : `${3 - adState.hint}/3`}
                                            </button>
                                            <button onClick={() => buyItem('hint', 100)} className="px-2 py-1.5 bg-slate-600 hover:bg-yellow-600 rounded-lg font-bold text-xs flex items-center gap-1 transition-colors shadow-md">
                                                <Coins size={12} className="text-yellow-400" /> 100
                                            </button>
                                        </div>
                                    </div>
                                    <div className="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2.5 bg-indigo-600 rounded-lg"><ClockPlus size={20} className="text-white"/></div>
                                            <div><div className="font-bold text-sm">{t('time_x3')}</div><div className="text-[10px] text-slate-400">{t('time_desc')}</div></div>
                                        </div>
                                        <div className="flex items-center gap-1.5 sm:gap-2">
                                            <button onClick={() => watchAd('time')} disabled={adState.time >= 3 || adCooldowns.time > 0} className={`px-2 py-1.5 rounded-lg font-bold text-xs flex items-center gap-1 transition-colors ${adState.time < 3 && adCooldowns.time === 0 ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-md' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`}>
                                                <VideoIcon size={14} className={adState.time < 3 && adCooldowns.time === 0 ? "text-blue-200" : "text-slate-400"} /> 
                                                {adCooldowns.time > 0 ? `${adCooldowns.time}s` : `${3 - adState.time}/3`}
                                            </button>
                                            <button onClick={() => buyItem('time', 150)} className="px-2 py-1.5 bg-slate-600 hover:bg-indigo-600 rounded-lg font-bold text-xs flex items-center gap-1 transition-colors shadow-md">
                                                <Coins size={12} className="text-yellow-400" /> 150
                                            </button>
                                        </div>
                                    </div>
                                    <div className="bg-slate-700/50 rounded-xl p-3 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2.5 bg-rose-600 rounded-lg"><FastForward size={20} className="text-white"/></div>
                                            <div><div className="font-bold text-sm">{t('pass_x3')}</div><div className="text-[10px] text-slate-400">{t('pass_desc')}</div></div>
                                        </div>
                                        <div className="flex items-center gap-1.5 sm:gap-2">
                                            <button onClick={() => watchAd('pass')} disabled={adState.pass >= 3 || adCooldowns.pass > 0} className={`px-2 py-1.5 rounded-lg font-bold text-xs flex items-center gap-1 transition-colors ${adState.pass < 3 && adCooldowns.pass === 0 ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-md' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`}>
                                                <VideoIcon size={14} className={adState.pass < 3 && adCooldowns.pass === 0 ? "text-blue-200" : "text-slate-400"} /> 
                                                {adCooldowns.pass > 0 ? `${adCooldowns.pass}s` : `${3 - adState.pass}/3`}
                                            </button>
                                            <button onClick={() => buyItem('pass', 200)} className="px-2 py-1.5 bg-slate-600 hover:bg-rose-600 rounded-lg font-bold text-xs flex items-center gap-1 transition-colors shadow-md">
                                                <Coins size={12} className="text-yellow-400" /> 200
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 광고 시청 중 오버레이 */}
                            {isWatchingAd && (
                                <div className="fixed inset-0 z-[100] bg-black/90 flex flex-col items-center justify-center text-white">
                                    <div className="flex flex-col items-center justify-center animate-pop-scale">
                                        <VideoIcon size={64} className="animate-pulse mb-6 text-blue-400" />
                                        <div className="text-2xl font-black">{t('watching_ad')}</div>
                                        <div className="text-base text-slate-400 mt-2 font-bold">{t('please_wait')}</div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {showRanking && (
                        <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md" onClick={() => setShowRanking(false)}>
                            <div className="bg-slate-800 w-full max-w-sm rounded-2xl shadow-2xl border border-slate-600 flex flex-col h-[70vh]" onClick={e => e.stopPropagation()}>
                                <div className="p-3 border-b border-slate-700 flex justify-between items-center bg-slate-800 rounded-t-2xl">
                                    <div className="flex items-center gap-2"><Trophy className="text-yellow-400" size={18} /><h2 className="text-lg font-bold">{t('ranking')}</h2></div>
                                    <button onClick={() => setShowRanking(false)} className="text-slate-400 p-1 hover:text-white"><CloseIcon size={20} /></button>
                                </div>
                                <div className="p-3 bg-slate-750 border-b border-slate-700">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <User size={18} className="text-blue-400" />
                                            {isEditingName ? (
                                                <div className="flex items-center gap-2">
                                                    <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)} className="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-white w-24" maxLength={8} />
                                                    <button onClick={updateNickname} className="text-xs bg-blue-600 px-2 py-1 rounded font-bold">{t('save')}</button>
                                                </div>
                                            ) : <span className="font-bold text-sm text-slate-200">{nickname}</span>}
                                        </div>
                                        {!isEditingName && <button onClick={() => { setTempName(nickname); setIsEditingName(true); }} className="text-slate-400 p-1 hover:text-blue-400"><Edit2 size={16} /></button>}
                                    </div>
                                </div>
                                <div className="flex border-b border-slate-700">
                                    <div className="flex-1 py-2 text-xs font-bold text-center bg-slate-700 text-yellow-400 border-b-2 border-yellow-400">{t('comprehensive_score')}</div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-1.5">
                                    {rankingScores.length === 0 ? <div className="text-center text-xs text-slate-500 py-4">{t('loading')}</div> : rankingScores.map((rank, idx) => (
                                        <div key={idx} className={`flex justify-between items-center p-2 rounded-lg ${user && rank.userId === user.uid ? 'bg-blue-900/40 border border-blue-500/30' : 'bg-slate-700/30'}`}>
                                            <div className="flex items-center gap-2">
                                                <span className={`font-black w-5 text-center text-xs ${idx < 3 ? 'text-yellow-400' : 'text-slate-500'}`}>{idx + 1}</span>
                                                <div className="flex flex-col">
                                                    <span className="text-xs font-medium text-slate-200">{rank.nickname}</span>
                                                    <span className="text-[8px] text-slate-500 leading-none">{rank.userId}</span>
                                                </div>
                                            </div>
                                            <div className="text-right"><div className="font-bold text-xs text-yellow-400">{rank.score}</div><div className="text-[10px] text-slate-400 font-mono">Lv.{rank.level}</div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {comboFlash && (
                        <div className="absolute top-1/2 left-1/2 z-[70] pointer-events-none animate-big-combo flex flex-col items-center justify-center whitespace-nowrap">
                            <div className="text-[8rem] leading-none drop-shadow-2xl filter" style={{ textShadow: '0 0 30px rgba(251, 146, 60, 0.8)' }}>
                                <Fire size={100} className="text-orange-500 inline-block mb-2 animate-pulse" fill="currentColor" />
                            </div>
                            <div className="text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 via-orange-500 to-red-600 drop-shadow-lg tracking-tighter" style={{ textShadow: '3px 3px 0px rgba(0,0,0,0.5)' }}>
                                {comboFlash} COMBO!
                            </div>
                        </div>
                    )}

                    {/* 메인 게임 영역 (종스크롤 전용 레이아웃) */}
                    <div className="flex-1 flex flex-col relative overflow-hidden">
                        {gameState === 'start' ? (
                            <div className="flex items-center justify-center w-full h-full p-4">
                                <div className="w-full max-w-sm text-center space-y-5 bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl relative z-10">
                                    <div className="flex flex-col items-center justify-center gap-2">
                                        <div className="flex justify-center gap-3 mb-2">
                                            <div className="w-12 h-16 bg-white rounded-xl flex flex-col items-center justify-center text-slate-800 shadow-lg transform -rotate-12 border-b-4 border-slate-300"><span className="text-3xl font-black leading-none">2</span></div>
                                            <div className="w-12 h-16 bg-white rounded-xl flex flex-col items-center justify-center text-slate-800 shadow-lg transform rotate-6 z-10 border-b-4 border-slate-300"><span className="text-3xl font-black leading-none">4</span></div>
                                        </div>
                                        <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-sm">{t('title')}</h1>
                                        
                                        {/* Energy Display on Start Screen */}
                                        <div className="flex items-center justify-center gap-2 mt-1 mb-1 bg-slate-900/60 py-1.5 px-4 rounded-full border border-slate-700/50 w-fit mx-auto">
                                            <Heart size={16} className="text-rose-500 fill-rose-500" />
                                            <span className="text-sm font-bold text-white">{energy} / {MAX_ENERGY}</span>
                                            {energy < MAX_ENERGY && (
                                                <span className="text-xs text-rose-300 font-mono ml-1 font-bold">{formatTime(timeToNextEnergy)}</span>
                                            )}
                                        </div>
                                    </div>
                                    <p className="text-slate-300 text-xs flex flex-col gap-1 px-4">
                                        <span>{t('subtitle1')}<br/>{t('subtitle2')}</span>
                                        <span className="text-[10px] text-emerald-400 font-bold mt-1 bg-emerald-900/30 py-1 px-2 rounded-full">{t('a_card_info')}</span>
                                    </p>
                                    <div className="flex flex-col gap-3 w-full pt-1">
                                        <button onClick={initGame} disabled={energy < 1} className={`w-full py-3.5 text-white font-bold text-lg rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 ${energy >= 1 ? 'bg-blue-600 active:bg-blue-700' : 'bg-slate-600 opacity-50 cursor-not-allowed'}`}>
                                            <Play size={20} fill="currentColor" /> {energy >= 1 ? t('game_start') : t('not_enough_energy')}
                                        </button>
                                        <button onClick={startTutorial} className="w-full py-3 bg-emerald-700 active:bg-emerald-600 text-white font-bold text-sm rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 border border-emerald-600">
                                            <CheckCircle size={18} /> {t('tutorial_btn')}
                                        </button>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowRanking(true)} className="flex-1 py-3 bg-slate-700 active:bg-slate-600 text-slate-200 font-bold text-sm rounded-xl shadow flex items-center justify-center gap-2 transition-transform active:scale-95">
                                            <Trophy size={18} /> {t('ranking')}
                                        </button>
                                        <button onClick={() => setShowShop(true)} className="flex-1 py-3 bg-indigo-700 active:bg-indigo-600 text-indigo-100 font-bold text-sm rounded-xl shadow flex items-center justify-center gap-2 transition-transform active:scale-95 border border-indigo-600">
                                            <ShoppingBag size={18} /> {t('shop')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <>
                                {/* 1. 사용할 카드(Deck) 영역 */}
                                <div className={`flex flex-col items-center justify-center py-6 bg-emerald-900 border-b-4 border-emerald-800 relative shadow-[inset_0_-10px_20px_rgba(0,0,0,0.2)] ${gameState === 'tutorial' && tutorialPhase === 0 && tutorialTexts[tutorialStep].focus === 'deck' ? 'z-[70] relative ring-4 ring-yellow-400' : ''}`} style={{background: 'linear-gradient(to bottom, #064e3b, #065f46)'}}>
                                    {!isPaused && (
                                        <>
                                            <div className="absolute top-2 left-4 text-[10px] text-emerald-200/60 font-bold uppercase tracking-wider flex items-center gap-2">
                                                {t('cards_to_use')}
                                            </div>
                                            
                                            {/* 정답 예시 오버레이 */}
                                            {gameState === 'fail' && solutionStr && (
                                                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                                    <div className="bg-slate-900/90 border-2 border-yellow-500 rounded-2xl p-5 text-center shadow-2xl max-w-sm w-full animate-pop-scale">
                                                        <div className="text-xs text-yellow-500/80 font-bold mb-1 uppercase tracking-widest">{t('time_over')}</div>
                                                        <div className="text-sm text-slate-300 mb-3">{t('too_bad')}</div>
                                                        <div className="text-2xl font-mono font-black text-yellow-400 tracking-wider drop-shadow-lg mb-1">{solutionStr}</div>
                                                        <div className="text-lg font-black text-white">= 24</div>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="flex items-center justify-center gap-3 md:gap-4 w-full px-4">
                                                {sourceCards.map((card, idx) => {
                                                    const used = isCardUsed(card.id);
                                                    return (
                                                        <div key={card.id} className={`transition-all duration-300 ${used ? 'opacity-0 scale-50 pointer-events-none' : 'opacity-100 scale-100 hover:scale-105 z-20'}`}>
                                                            <Card card={card} className={deckCardClass} onClick={() => handleSourceCardClick(card)} />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            <div className="absolute -bottom-3 text-emerald-400/50 z-20 bg-emerald-900 border-2 border-emerald-800 rounded-full p-0.5"><ArrowDown size={16} /></div>
                                        </>
                                    )}
                                </div>

                                {/* 2. 슬롯 및 연산 영역 (중단) */}
                                <div className={`flex-1 flex flex-col items-center justify-center w-full px-1 relative bg-emerald-900 shadow-[inset_0_10px_20px_rgba(0,0,0,0.3)] ${gameState === 'tutorial' && tutorialPhase === 0 && tutorialTexts[tutorialStep].focus === 'slot' ? 'z-[70] relative ring-4 ring-yellow-400' : ''}`}>
                                    {hintText && (
                                        <div className="absolute -top-4 sm:-top-6 left-1/2 transform -translate-x-1/2 z-[60] animate-pop">
                                            <div className="bg-black/80 backdrop-blur-md border border-yellow-400/50 rounded-full px-5 py-2 flex items-center gap-3 shadow-2xl">
                                                <span className="text-yellow-400 text-[10px] font-bold uppercase tracking-widest">{t('hint_upper')}</span>
                                                <span className="text-xl font-black font-mono text-white tracking-widest">{hintText}</span>
                                            </div>
                                        </div>
                                    )}

                                    <div className={`flex items-center justify-center gap-1 sm:gap-2 w-full max-w-lg mx-auto ${shake ? 'animate-shake' : ''}`}>
                                        {slots.map((slotCard, idx) => (
                                            <React.Fragment key={idx}>
                                                <div className="relative flex items-center justify-center">
                                                    {/* 카드 공간 여유 확보로 괄호가 가려지지 않음 */}
                                                    <div 
                                                        onClick={() => toggleStartBracket(idx)} 
                                                        className={`absolute -left-4 sm:-left-5 top-1/2 -translate-y-1/2 z-30 w-8 h-full flex items-center justify-center cursor-pointer select-none transition-all duration-200 ${startBrackets[idx] > 0 ? 'text-yellow-400 font-black text-4xl sm:text-5xl scale-110' : 'text-white/40 font-bold text-2xl sm:text-3xl'}`}
                                                        style={{ textShadow: startBrackets[idx] > 0 ? '2px 2px 0 #1e293b, -1.5px -1.5px 0 #1e293b, 1.5px -1.5px 0 #1e293b, -1.5px 1.5px 0 #1e293b, 0 4px 8px rgba(0,0,0,0.8)' : '1px 1px 2px rgba(0,0,0,0.8)' }}
                                                    >
                                                        {startBrackets[idx] === 1 ? '(' : startBrackets[idx] === 2 ? '((' : '('}
                                                    </div>
                                                    
                                                    {slotCard ? <Card card={slotCard} className={slotCardClass} onClick={() => handleSlotCardClick(idx)} /> : <Card isPlaceholder={true} className={slotCardClass} />}

                                                    <div 
                                                        onClick={() => toggleEndBracket(idx)} 
                                                        className={`absolute -right-4 sm:-right-5 top-1/2 -translate-y-1/2 z-30 w-8 h-full flex items-center justify-center cursor-pointer select-none transition-all duration-200 ${endBrackets[idx] > 0 ? 'text-yellow-400 font-black text-4xl sm:text-5xl scale-110' : 'text-white/40 font-bold text-2xl sm:text-3xl'}`}
                                                        style={{ textShadow: endBrackets[idx] > 0 ? '2px 2px 0 #1e293b, -1.5px -1.5px 0 #1e293b, 1.5px -1.5px 0 #1e293b, -1.5px 1.5px 0 #1e293b, 0 4px 8px rgba(0,0,0,0.8)' : '1px 1px 2px rgba(0,0,0,0.8)' }}
                                                    >
                                                        {endBrackets[idx] === 1 ? ')' : endBrackets[idx] === 2 ? '))' : ')'}
                                                    </div>
                                                </div>

                                                {/* 연산자 세로로 4개 배치 (가로폭 절약을 위해 크기 최적화) */}
                                                {idx < 3 && (
                                                    <div className="relative z-[40] flex flex-col items-center justify-center mx-1 sm:mx-1.5 gap-1">
                                                        {OPERATORS.map(op => (
                                                            <button 
                                                                key={op}
                                                                onClick={(e) => { 
                                                                    e.stopPropagation(); 
                                                                    selectOperator(idx, op); 
                                                                }}
                                                                className={`w-6 h-6 sm:w-8 sm:h-8 rounded-md flex items-center justify-center font-black text-sm sm:text-base transition-all duration-150 ${
                                                                    operators[idx] === op 
                                                                    ? OPERATOR_STYLES[op] + ' scale-110 ring-2 ring-white/50 z-10' 
                                                                    : OPERATOR_STYLES_INACTIVE[op] + ' hover:scale-105 opacity-60 hover:opacity-100'
                                                                }`}
                                                            >
                                                                {OPERATOR_DISPLAY[op]}
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </div>
                                    
                                    <div className="mt-6 flex flex-col items-center justify-center">
                                        <div className={`text-center leading-tight h-5 mb-2 ${gameState === 'success' ? 'text-emerald-300' : gameState === 'fail' ? 'text-red-400' : 'text-emerald-200'}`}>
                                            {resultMessage ? <span className="text-sm font-bold drop-shadow-md">{resultMessage}</span> : <span className="text-xs text-emerald-400/50 font-medium">{t('place_cards')}</span>}
                                        </div>
                                    </div>
                                </div>

                                {/* 3. 하단 액션 & 아이템 바 */}
                                <div className={`flex flex-col gap-4 p-4 pb-8 pt-4 bg-emerald-900 border-t border-emerald-800/50 ${gameState === 'tutorial' && tutorialPhase === 0 && (tutorialTexts[tutorialStep].focus.startsWith('item') || tutorialTexts[tutorialStep].focus === 'items') ? 'z-[70] relative ring-4 ring-yellow-400' : ''}`}>
                                    {/* 가로형 아이템 배치 */}
                                    {(gameState === 'playing' || gameState === 'tutorial') && !isPaused && (
                                        <div className="flex justify-center gap-6 sm:gap-8 w-full max-w-sm mx-auto mb-2">
                                            <button onClick={useTimeItem} disabled={timeItemsLeft === 0} className="flex flex-col items-center group">
                                                <div className={`w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center rounded-2xl border-2 shadow-lg transition-transform active:scale-90 ${timeItemsLeft > 0 ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-500'}`}>
                                                    <ClockPlus size={28} />
                                                </div>
                                                <div className="mt-2 text-center leading-tight">
                                                    <span className="text-xs font-bold text-slate-300 block mb-0.5">{t('time')}</span>
                                                    <span className={`text-lg font-black ${timeItemsLeft > 0 ? 'text-indigo-300' : 'text-slate-500'}`}>{timeItemsLeft}</span>
                                                </div>
                                            </button>
                                            <button onClick={useHint} disabled={hintsLeft === 0} className="flex flex-col items-center group">
                                                <div className={`w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center rounded-2xl border-2 shadow-lg transition-transform active:scale-90 ${hintsLeft > 0 ? 'bg-yellow-600 border-yellow-400 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-500'}`}>
                                                    <Lightbulb size={28} />
                                                </div>
                                                <div className="mt-2 text-center leading-tight">
                                                    <span className="text-xs font-bold text-slate-300 block mb-0.5">{t('hint')}</span>
                                                    <span className={`text-lg font-black ${hintsLeft > 0 ? 'text-yellow-300' : 'text-slate-500'}`}>{hintsLeft}</span>
                                                </div>
                                            </button>
                                            <button onClick={usePassItem} disabled={passItemsLeft === 0} className="flex flex-col items-center group">
                                                <div className={`w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center rounded-2xl border-2 shadow-lg transition-transform active:scale-90 ${passItemsLeft > 0 ? 'bg-rose-600 border-rose-400 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-500'}`}>
                                                    <FastForward size={28} />
                                                </div>
                                                <div className="mt-2 text-center leading-tight">
                                                    <span className="text-xs font-bold text-slate-300 block mb-0.5">{t('pass')}</span>
                                                    <span className={`text-lg font-black ${passItemsLeft > 0 ? 'text-rose-300' : 'text-slate-500'}`}>{passItemsLeft}</span>
                                                </div>
                                            </button>
                                        </div>
                                    )}

                                    {/* 메인 확인/다음 버튼 */}
                                    <div className="flex justify-center w-full max-w-sm mx-auto">
                                        {(gameState === 'playing' || gameState === 'tutorial') ? (
                                            <button onClick={checkResult} disabled={isPaused || (gameState === 'tutorial' && tutorialPhase === 0)} className="w-full py-3.5 bg-emerald-600 active:bg-emerald-700 disabled:opacity-50 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-2 border border-emerald-400/30">
                                                <CheckCircle size={20} /> {t('check_answer')}
                                            </button>
                                        ) : null}
                                        
                                        {gameState === 'success' && (
                                            <button onClick={nextLevel} className="w-full py-3.5 bg-blue-600 active:bg-blue-700 text-white font-bold text-lg rounded-2xl shadow-xl animate-bounce flex items-center justify-center gap-2">
                                                {level === 'T' ? (tutorialPhase === 3 ? t('start_main_game') : t('next_problem')) : t('next_problem')} <Play size={20} fill="currentColor" />
                                            </button>
                                        )}
                                        {gameState === 'fail' && (
                                            <button onClick={retryLevel} disabled={energy < 1} className={`w-full py-3.5 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-2 ${energy >= 1 ? 'bg-slate-600 active:bg-slate-500' : 'bg-slate-700 opacity-50 cursor-not-allowed'}`}>
                                                <RotateCcw size={20} /> {energy >= 1 ? t('retry') : t('not_enough_energy')}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    {/* 튜토리얼 팝업 박스 (가이드 단계) - 항상 최상단 분리 노출 */}
                    {gameState === 'tutorial' && tutorialPhase === 0 && (
                        <div
                            className="absolute z-[100] w-full max-w-sm px-4 animate-pop pointer-events-auto"
                            style={getGuideBoxStyle(tutorialTexts[tutorialStep].position)}
                            onClick={(e) => e.stopPropagation()}
                        >
                            <div className="bg-slate-800 border-2 border-indigo-500 rounded-2xl p-6 shadow-2xl relative">
                                <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white text-xs font-black px-4 py-1 rounded-full shadow-lg border-2 border-slate-800">
                                    GUIDE {tutorialStep + 1}/7
                                </div>
                                <p className="text-base font-bold text-white mb-6 whitespace-pre-wrap leading-relaxed mt-2 text-center">
                                    {tutorialTexts[tutorialStep].text}
                                </p>
                                <div className="flex justify-between gap-3">
                                    <button 
                                        onClick={() => setTutorialStep(Math.max(0, tutorialStep - 1))}
                                        className={`px-4 py-2 rounded-lg font-bold text-sm ${tutorialStep === 0 ? 'bg-slate-700 text-slate-500' : 'bg-slate-600 text-white hover:bg-slate-500'}`}
                                        disabled={tutorialStep === 0}
                                    >
                                        {t('prev')}
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (tutorialStep < tutorialTexts.length - 1) {
                                                setTutorialStep(tutorialStep + 1);
                                            } else {
                                                finishTutorialGuide();
                                            }
                                        }}
                                        className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg shadow-lg text-sm"
                                    >
                                        {tutorialStep < tutorialTexts.length - 1 ? t('next') : t('start_practice')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Make24Game />);
    </script>
</body>
</html>
