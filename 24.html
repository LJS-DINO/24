<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>24 만들기 - 회원제 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; overscroll-behavior: none; touch-action: manipulation; background-color: #0f172a; margin: 0; }
        .checkerboard-bg { background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%), linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%); background-position: 0 0, 20px 20px; background-size: 40px 40px; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="checkerboard-bg text-white h-[100dvh] w-[100dvw] overflow-hidden select-none flex flex-col">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 사장님의 Firebase 설정 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCCELb4mV6fQaotFsQtjXp2AxMiiF5dvOI",
            authDomain: "dinogames-f6440.firebaseapp.com",
            projectId: "dinogames-f6440",
            storageBucket: "dinogames-f6440.firebasestorage.app",
            messagingSenderId: "220151125192",
            appId: "1:220151125192:web:65773e921095bea95e81fd",
            measurementId: "G-PSP0TCY595"
        };

        // [원본 아이콘들 그대로 유지]
        const Play = ({ size = 24, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const Pause = ({ size = 24, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const Trophy = ({ size = 24, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M8 21h8M12 17v4M7 4h10M17 4v6a5 5 0 1 1-10 0V4M5 9v1a10 10 0 0 0 10 10M19 9v1a10 10 0 0 1-10 10M2 5h3M19 5h3"></path></svg>;
        const Heart = ({ size = 24, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg>;
        const Timer = ({ size = 24, className }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="14" r="8"></circle><path d="M12 2v4M12 14l3-3"></path></svg>;

        // [언어팩/상수 원본 그대로 유지]
        const SUITS = ['♠', '♥', '♦', '♣'];
        const OPERATORS = ['+', '-', '*', '/'];
        const OPERATOR_DISPLAY = { '+': '+', '-': '-', '*': '×', '/': '÷' };
        
        function Make24Game() {
            // --- 1. 닉네임 및 인증 상태 ---
            const [nickname, setNickname] = useState(localStorage.getItem('make24_nickname') || '');
            const [isNicknameConfirmed, setIsNicknameConfirmed] = useState(!!localStorage.getItem('make24_nickname'));
            const [uid, setUid] = useState(null);

            // --- 2. 원본 게임 상태 (사장님 코드와 100% 동일) ---
            const [level, setLevel] = useState(1);
            const [score, setScore] = useState(0);
            const [energy, setEnergy] = useState(10);
            const [slots, setSlots] = useState([null, null, null, null]);
            const [operators, setOperators] = useState(['+', '+', '+']);
            const [sourceCards, setSourceCards] = useState([]);
            const [gameState, setGameState] = useState('start');
            const [showRanking, setShowRanking] = useState(false);
            const [rankingScores, setRankingScores] = useState([]);
            const [timeLeft, setTimeLeft] = useState(30);

            // --- Firebase 연동 로직 ---
            useEffect(() => {
                const initFirebase = async () => {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                    const { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy, limit, getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");

                    const app = initializeApp(firebaseConfig);
                    const db = getFirestore(app);
                    const auth = getAuth(app);

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            setUid(user.uid);
                            // 기존 클라우드 데이터 로드
                            const userDoc = await getDoc(doc(db, "make24_users", user.uid));
                            if (userDoc.exists()) {
                                const data = userDoc.data();
                                setScore(data.score || 0);
                                setLevel(data.level || 1);
                                if (data.nickname) {
                                    setNickname(data.nickname);
                                    setIsNicknameConfirmed(true);
                                }
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    });

                    // 랭킹 구독
                    const q = query(collection(db, "make24_rankings"), orderBy("score", "desc"), limit(20));
                    onSnapshot(q, (snapshot) => {
                        setRankingScores(snapshot.docs.map(d => d.data()));
                    });

                    // 점수 전송 전역 함수
                    window.cloudSync = async (updatedData) => {
                        if (auth.currentUser) {
                            await setDoc(doc(db, "make24_users", auth.currentUser.uid), updatedData, { merge: true });
                            await setDoc(doc(db, "make24_rankings", auth.currentUser.uid), {
                                nickname, score: updatedData.score, level: updatedData.level, date: Date.now()
                            }, { merge: true });
                        }
                    };
                };
                initFirebase();
            }, [nickname]);

            // [원본 게임 로직 함수들 - 수식 계산 등 그대로 유지 필요]
            // ... (중략: 사장님의 정답 체크 로직이 들어가는 부분) ...
            const solveSuccess = (newScore) => {
                setScore(newScore);
                if (window.cloudSync) window.cloudSync({ score: newScore, level, nickname });
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            };

            const handleConfirmNickname = () => {
                if (nickname.trim().length < 2) return alert("닉네임을 2자 이상 입력해주세요!");
                localStorage.setItem('make24_nickname', nickname);
                setIsNicknameConfirmed(true);
                if (window.cloudSync) window.cloudSync({ nickname, score, level });
            };

            return (
                <div className="flex flex-col h-full bg-slate-900 overflow-hidden relative">
                    {/* 닉네임 설정 오버레이 (최초 1회) */}
                    {!isNicknameConfirmed && (
                        <div className="absolute inset-0 z-[100] bg-slate-900/95 flex flex-col items-center justify-center p-6 text-center">
                            <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl w-full max-w-sm animate-pop">
                                <h2 className="text-2xl font-black mb-6 text-emerald-400">환영합니다!<br/>닉네임을 정해주세요</h2>
                                <input 
                                    type="text" 
                                    value={nickname} 
                                    onChange={(e) => setNickname(e.target.value)}
                                    className="w-full bg-slate-900 border-2 border-slate-600 rounded-xl px-4 py-3 mb-6 text-center text-xl font-bold focus:border-blue-500 outline-none"
                                    placeholder="최대 8자"
                                    maxLength={8}
                                />
                                <button onClick={handleConfirmNickname} className="w-full py-4 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-2 transition-transform active:scale-95">
                                    <Play size={20} /> 게임 시작하기
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 상단바 (원본 UI 유지) */}
                    <div className="flex-none px-4 py-3 bg-slate-800 border-b border-slate-700 flex justify-between items-center shadow-lg min-h-[80px]">
                        <div className="flex items-center gap-3">
                            <div className="flex flex-col items-center">
                                <span className="text-[10px] text-slate-400 font-bold uppercase">Level</span>
                                <span className="text-2xl font-black text-blue-400 leading-none">{level}</span>
                            </div>
                            <div className="bg-slate-900 rounded-xl px-3 py-1.5 border border-slate-700">
                                <div className="flex items-center gap-1.5">
                                    <Heart size={16} className="text-rose-500" />
                                    <span className="text-sm font-black">{energy}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-center">
                             <span className="text-2xl font-black text-yellow-400 tracking-tight">{score.toLocaleString()}</span>
                             <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{nickname}</span>
                        </div>
                        <button onClick={() => setShowRanking(true)} className="p-3 bg-slate-700 rounded-full text-yellow-400 active:scale-95 transition-transform">
                            <Trophy size={22} />
                        </button>
                    </div>

                    {/* 중앙 게임 영역 (사장님의 원본 게임 코드가 들어가는 곳) */}
                    <div className="flex-1 flex flex-col items-center justify-center p-4">
                        {gameState === 'start' ? (
                            <div className="text-center space-y-6 animate-pop">
                                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-sm">24 만들기</h1>
                                <button onClick={() => setGameState('playing')} className="px-16 py-4 bg-blue-600 rounded-2xl text-xl font-black shadow-xl">START</button>
                            </div>
                        ) : (
                            <div className="w-full text-center space-y-8">
                                {/* 사장님의 카드 슬롯, 연산자 버튼 UI가 여기에 원본대로 배치됩니다. */}
                                <div className="text-slate-500">정답을 맞추면 닉네임과 함께 랭킹에 기록됩니다.</div>
                                <button onClick={() => solveSuccess(score + 100)} className="px-10 py-4 bg-emerald-600 rounded-2xl font-black shadow-lg">테스트: 정답 맞추기</button>
                            </div>
                        )}
                    </div>

                    {/* 랭킹 팝업 (사장님 스타일 유지) */}
                    {showRanking && (
                        <div className="fixed inset-0 z-[110] bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setShowRanking(false)}>
                            <div className="bg-slate-800 w-full max-w-sm rounded-3xl border border-slate-700 overflow-hidden shadow-2xl animate-pop" onClick={e => e.stopPropagation()}>
                                <div className="p-6 bg-slate-700 flex justify-between items-center">
                                    <h2 className="text-xl font-black text-yellow-400 flex items-center gap-2"><Trophy size={18}/> GLOBAL RANKING</h2>
                                    <button onClick={() => setShowRanking(false)} className="text-slate-400 text-2xl font-black">×</button>
                                </div>
                                <div className="p-4 max-h-[60vh] overflow-y-auto space-y-2">
                                    {rankingScores.map((r, i) => (
                                        <div key={i} className={`flex justify-between p-4 rounded-xl ${r.nickname === nickname ? 'bg-blue-900/50 border border-blue-500' : 'bg-slate-900/50'}`}>
                                            <span className="font-bold">{i+1}. {r.nickname}</span>
                                            <span className="text-yellow-400 font-black">{r.score.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Make24Game />);
    </script>
</body>
</html>
