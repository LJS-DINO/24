            overscroll-behavior: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;

            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            background-color: #0f172a; /* slate-900 */
            margin: 0;
        }

        .checkerboard-bg {
            background-color: #0f172a;
            background-image:
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%, rgba(255, 255, 255, 0.03)),
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.03) 75%, rgba(255, 255, 255, 0.03));
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-4px); }
          75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        @keyframes popIn {
            0% { transform: translate(-50%, -40%) scale(0.9); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popUp {
            0% { transform: scale(0.5) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-popup { animation: popUp 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popScale {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-scale { animation: popScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes redAlert {
            0% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); background-color: rgba(239, 68, 68, 0); }
            50% { box-shadow: inset 0 0 0 10px rgba(239, 68, 68, 0.8), inset 0 0 60px rgba(239, 68, 68, 0.5); background-color: rgba(239, 68, 68, 0.15); }
            100% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); background-color: rgba(239, 68, 68, 0); }
        }
        .animate-red-alert { animation: redAlert 1s infinite cubic-bezier(0.4, 0, 0.6, 1); }

        @keyframes comboPopup {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-combo { animation: comboPopup 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes bigComboPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.5) rotate(-5deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.8) rotate(0deg); opacity: 0; }
        }
        .animate-big-combo { animation: bigComboPop 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes scoreFloat {
            0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
            20% { transform: translate(-50%, -15px) scale(1.2); opacity: 1; }
            80% { transform: translate(-50%, -30px) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -45px) scale(0.8); opacity: 0; }
        }
        .animate-score { animation: scoreFloat 1s ease-out forwards; }

        @keyframes timePlus {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { transform: translateY(-15px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-30px) scale(1); opacity: 0; }
        }
        .animate-time-plus { animation: timePlus 0.8s ease-out forwards; }
    </style>
</head>

        };

        const OPERATOR_STYLES = {
            '+': 'bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white shadow-lg',

        // --- Logic ---
        const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const getRandomSuit = () => SUITS[Math.floor(Math.random() * SUITS.length)];

        const isSolvable = (nums) => {
            if (nums.length === 1) return Math.abs(nums[0] - 24) < 0.000001;
            for (let i = 0; i < nums.length; i++) {
                for (let j = 0; j < nums.length; j++) {
                    if (i === j) continue;
                    const list = [];
                    for (let k = 0; k < nums.length; k++) {
                        if (k !== i && k !== j) list.push(nums[k]);
                    }
                    const a = nums[i];
                    const b = nums[j];
                    const results = [a + b, a - b, b - a, a * b];
                    if (b !== 0 && a % b === 0) results.push(a / b);
                    if (a !== 0 && b % a === 0) results.push(b / a);
                    for (let res of results) {
                        if (isSolvable([...list, res])) return true;
                    }
                }
            }
            return false;
        };

        const isHandValid = (handValues) => {
            const combinations = [[]];
            for (let val of handValues) {
                const newCombs = [];
                combinations.forEach(comb => {
                    if (val === 1) {
                        newCombs.push([...comb, 1]);
                        newCombs.push([...comb, 10]);
                    } else {
                        newCombs.push([...comb, val]);
                    }
                });
                combinations.length = 0;
                combinations.push(...newCombs);
            }
            return combinations.some(comb => isSolvable(comb));
        };

        const generateEasyNumbers = () => {
            const types = ['identity', 'cancel', 'split_sum', 'split_mul'];
            const type = types[Math.floor(Math.random() * types.length)];
            let nums = [];

            const base = Math.random() < 0.5 ? [3, 8] : [4, 6];
            
            if (type === 'identity') {
                nums = [...base, 1, 1];
            } else if (type === 'cancel') {
                const n = getRandomInt(2, 9);
                nums = [...base, n, n];
            } else if (type === 'split_sum') {
                const target = base[1]; 
                const splitA = getRandomInt(1, target - 1);
                const splitB = target - splitA;
                nums = [base[0], splitA, splitB, 1];
            } else if (type === 'split_mul') {
                nums = [2, 3, 4, 1];
            }

            for (let i = nums.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [nums[i], nums[j]] = [nums[j], nums[i]];
            }
            return nums;
        };

            if (isTut) {

                if (phase === 2) return [{ id: 't2-1', value: 6, suit: '♠', display: '6' }, { id: 't2-2', value: 4, suit: '♥', display: '4' }, { id: 't2-3', value: 1, suit: '♣', display: 'A' }, { id: 't2-4', value: 1, suit: '♦', display: 'A' }];
                if (phase === 3) return [{ id: 't3-1', value: 5, suit: '♠', display: '5' }, { id: 't3-2', value: 7, suit: '♥', display: '7' }, { id: 't3-3', value: 8, suit: '♣', display: '8' }, { id: 't3-4', value: 4, suit: '♦', display: '4' }];
                if (phase === 4) return [{ id: 't4-1', value: 3, suit: '♠', display: '3' }, { id: 't4-2', value: 5, suit: '♥', display: '5' }, { id: 't4-3', value: 3, suit: '♣', display: '3' }, { id: 't4-4', value: 1, suit: '♦', display: 'A' }];
                if (phase === 5) return [{ id: 't5-1', value: 2, suit: '♠', display: '2' }, { id: 't5-2', value: 2, suit: '♥', display: '2' }, { id: 't5-3', value: 3, suit: '♣', display: '3' }, { id: 't5-4', value: 2, suit: '♦', display: '2' }];
                
                return [{ id: 't1-1', value: 8, suit: '♠', display: '8' }, { id: 't1-2', value: 3, suit: '♥', display: '3' }, { id: 't1-3', value: 1, suit: '♣', display: 'A' }, { id: 't1-4', value: 1, suit: '♦', display: 'A' }];
            }

            if (currentSolved <= 5) {
                while (attempts < 100) {
                    const values = generateEasyNumbers();
                    if (isHandValid(values)) {
                        cards = values.map((val, index) => ({
                            id: `card-${index}-${Date.now()}`,
                            value: val,
                            suit: getRandomSuit(),
                            display: val === 1 ? 'A' : val.toString()
                        }));
                        return cards;
                    }
                    attempts++;
                }
            }

            while (attempts < 1000) {
                const values = Array.from({ length: 4 }, () => AVAILABLE_NUMBERS[getRandomInt(0, 9)]);
                if (isHandValid(values)) {
                    cards = values.map((val, index) => ({
                        id: `card-${index}-${Date.now()}`,
                        value: val,
                        suit: getRandomSuit(),
                        display: val === 1 ? 'A' : val.toString()
                    }));
                    return cards;
                }
                attempts++;
            }
            
            return [
                { id: '1', value: 8, suit: '♠', display: '8' },
                { id: '2', value: 8, suit: '♥', display: '8' },
                { id: '3', value: 3, suit: '♦', display: '3' },
                { id: '4', value: 1, suit: '♣', display: 'A' }
            ];
        };

        const OPERATOR_FUNCS = { '+': (a, b) => a + b, '-': (a, b) => a - b, '*': (a, b) => a * b, '/': (a, b) => a / b };
        const OPERATOR_PRECEDENCE = { '+': 1, '-': 1, '*': 2, '/': 2 };

        const solve24 = (nums) => {
            if (nums.length === 1) {
                if (Math.abs(nums[0].val - 24) < 0.001) return nums[0].str;
                return null;
            }

            for (let i = 0; i < nums.length; i++) {
                for (let j = 0; j < nums.length; j++) {
                    if (i === j) continue;
                    
                    const list = [];
                    for (let k = 0; k < nums.length; k++) {
                        if (k !== i && k !== j) list.push(nums[k]);
                    }

                    const a = nums[i];
                    const b = nums[j];

                    for (let op of Object.keys(OPERATOR_FUNCS)) {
                        if (op === '/' && (b.val === 0 || a.val % b.val !== 0)) continue;
                        if (op === '-' && a.val < b.val) continue;

                        const newVal = OPERATOR_FUNCS[op](a.val, b.val);
                        const opPrec = OPERATOR_PRECEDENCE[op];
                        
                        let strA = a.str;
                        let strB = b.str;

                        if (a.prec < opPrec) strA = `(${strA})`;
                        if (b.prec < opPrec || (b.prec === opPrec && (op === '-' || op === '/'))) {
                            strB = `(${strB})`;
                        }

                        const newStr = `${strA} ${OPERATOR_DISPLAY[op]} ${strB}`;
                        const res = solve24([...list, { val: newVal, str: newStr, prec: opPrec }]);
                        if (res) return res;
                    }
                }
            }
            return null;
        };

                        if (diff >= RECHARGE_TIME_MS) {
                            const gained = Math.floor(diff / RECHARGE_TIME_MS);

                            lastTime = lastTime + (gained * RECHARGE_TIME_MS);
                            
                            setEnergy(currentEnergy);
                            setLastEnergyTime(lastTime);
                            localStorage.setItem('make24_energy', currentEnergy.toString());
                            localStorage.setItem('make24_energy_time', lastTime.toString());

                        if (currentEnergy < MAX_ENERGY) {
                            setTimeToNextEnergy(RECHARGE_TIME_MS - (Date.now() - lastTime));
                        } else {
                            setTimeToNextEnergy(0);
                        }
                    } else {
                        setLastEnergyTime(Date.now());
                        localStorage.setItem('make24_energy_time', Date.now().toString());

            const saveRecord = async (currentScore, currentCombo, currentSolved) => {

                try {

                return { base: basePoints, multiplier, total: basePoints * multiplier };

                const cardOptions = slots.map(c => c.value === 1 ? [1, 10] : [c.value]); 
                let possibleValueSets = [[]];
                for (let options of cardOptions) {
                    const next = [];
                    for (let prev of possibleValueSets) {
                        for (let opt of options) { next.push([...prev, opt]); }
                    }
                    possibleValueSets = next;
                }
                let solved = false;
                let winningExpression = "";
                let lastError = null;
                for (let values of possibleValueSets) {

                                </div>
                                <div className="font-bold text-sm leading-snug">

                                        <div className="text-base text-slate-400 mt-2 font-bold">{t('please_wait')}</div>
                                    </div>
                                </div>

                                            </div>
                                        )}

                                        <button onClick={startTutorial} className={`w-full py-3 bg-emerald-700 text-white font-bold text-sm rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95 border border-emerald-600 relative ${showWelcomeTutorialHook ? 'animate-pulse ring-4 ring-yellow-400 z-50' : 'hover:bg-emerald-600'}`}>
                                            <CheckCircle size={18} /> {t('tutorial_btn')}
                                        </button>
                                        <button onClick={initGame} disabled={energy < 1} className={`w-full py-3.5 text-white font-bold text-lg rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 ${energy >= 1 ? 'bg-blue-600 active:bg-blue-700' : 'bg-slate-600 opacity-50 cursor-not-allowed'}`}>
                                            <Play size={20} fill="currentColor" /> {energy >= 1 ? t('game_start') : t('not_enough_energy')}
                                        </button>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowRanking(true)} className="flex-1 py-3 bg-slate-700 active:bg-slate-600 text-slate-200 font-bold text-sm rounded-xl shadow flex items-center justify-center gap-2 transition-transform active:scale-95">
                                            <Trophy size={18} /> {t('ranking')}
                                        </button>
                                        <button onClick={() => setShowShop(true)} className="flex-1 py-3 bg-indigo-700 active:bg-indigo-600 text-indigo-100 font-bold text-sm rounded-xl shadow flex items-center justify-center gap-2 transition-transform active:scale-95 border border-indigo-600">
                                            <ShoppingBag size={18} /> {t('shop')}
                                        </button>
                                    </div>
                                </div>
                                {/* 환영 모드일 때 로비 뒷배경 어둡게 처리 */}
                                {showWelcomeTutorialHook && <div className="absolute inset-0 bg-black/60 z-[5] pointer-events-none"></div>}
                            </div>
                        ) : (
                            <>
                                {/* 1. 사용할 카드(Deck) 영역 */}
                                <div className={`flex flex-col items-center justify-center py-6 bg-emerald-900 border-b-4 border-emerald-800 relative shadow-[inset_0_-10px_20px_rgba(0,0,0,0.2)]`} style={{background: 'linear-gradient(to bottom, #064e3b, #065f46)'}}>
                                    {!isPaused && (
                                        <>
                                            {tutorialPhase > 0 ? (
                                                <div className="absolute top-3 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-slate-900 text-xs sm:text-sm font-black px-4 py-1.5 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.5)] z-30 whitespace-nowrap border-2 border-yellow-300">
                                                    {t(`tut_goal_${tutorialPhase}`)}
                                                </div>
                                            ) : (
                                                <div className="absolute top-2 left-4 text-[10px] text-emerald-200/60 font-bold uppercase tracking-wider flex items-center gap-2">
                                                    {t('cards_to_use')}
                                                </div>
                                            )}
                                            
                                            {/* 정답 예시 오버레이 */}
                                            {gameState === 'fail' && solutionStr && (
                                                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                                                    <div className="bg-slate-900/90 border-2 border-yellow-500 rounded-2xl p-5 text-center shadow-2xl max-w-sm w-full animate-pop-scale">
                                                        <div className="text-xs text-yellow-500/80 font-bold mb-1 uppercase tracking-widest">{t('time_over')}</div>
                                                        <div className="text-sm text-slate-300 mb-3">{t('too_bad')}</div>
                                                        <div className="text-2xl font-mono font-black text-yellow-400 tracking-wider drop-shadow-lg mb-1">{solutionStr}</div>
                                                        <div className="text-lg font-black text-white">= 24</div>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="flex items-center justify-center gap-3 md:gap-4 w-full px-4">
                                                {sourceCards.map((card, idx) => {
                                                    const used = isCardUsed(card.id);
                                                    return (
                                                        <div key={card.id} className={`transition-all duration-300 ${used ? 'opacity-0 scale-50 pointer-events-none' : 'opacity-100 scale-100 hover:scale-105 z-20'}`}>
                                                            <Card card={card} className={deckCardClass} onClick={() => handleSourceCardClick(card)} />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            <div className="absolute -bottom-3 text-emerald-400/50 z-20 bg-emerald-900 border-2 border-emerald-800 rounded-full p-0.5"><ArrowDown size={16} /></div>
                                        </>
                                    )}
                                </div>

                                {/* 2. 슬롯 및 연산 영역 (중단) */}
                                <div className={`flex-1 flex flex-col items-center justify-center w-full px-1 relative bg-emerald-900 shadow-[inset_0_10px_20px_rgba(0,0,0,0.3)]`}>
                                    {hintText && (
                                        <div className="absolute -top-4 sm:-top-6 left-1/2 transform -translate-x-1/2 z-[60] animate-pop">
                                            <div className="bg-black/80 backdrop-blur-md border border-yellow-400/50 rounded-full px-5 py-2 flex items-center gap-3 shadow-2xl">
                                                <span className="text-yellow-400 text-[10px] font-bold uppercase tracking-widest">{t('hint_upper')}</span>
                                                <span className="text-xl font-black font-mono text-white tracking-widest">{hintText}</span>
                                            </div>
                                        </div>
                                    )}

                                    <div className={`flex items-center justify-center gap-1 sm:gap-2 w-full max-w-lg mx-auto ${shake ? 'animate-shake' : ''}`}>
                                        {slots.map((slotCard, idx) => (
                                            <React.Fragment key={idx}>
                                                <div className="relative flex items-center justify-center">
                                                    {/* 카드 공간 여유 확보로 괄호가 가려지지 않음 */}
                                                    <div 
                                                        onClick={() => toggleStartBracket(idx)} 
                                                        className={`absolute -left-4 sm:-left-5 top-1/2 -translate-y-1/2 z-30 w-8 h-full flex items-center justify-center cursor-pointer select-none transition-all duration-200 ${startBrackets[idx] > 0 ? 'text-yellow-400 font-black text-4xl sm:text-5xl scale-110' : 'text-white/40 font-bold text-2xl sm:text-3xl'}`}
                                                        style={{ textShadow: startBrackets[idx] > 0 ? '2px 2px 0 #1e293b, -1.5px -1.5px 0 #1e293b, 1.5px -1.5px 0 #1e293b, -1.5px 1.5px 0 #1e293b, 0 4px 8px rgba(0,0,0,0.8)' : '1px 1px 2px rgba(0,0,0,0.8)' }}
                                                    >
                                                        {startBrackets[idx] === 1 ? '(' : startBrackets[idx] === 2 ? '((' : '('}
                                                    </div>
                                                    
                                                    {slotCard ? <Card card={slotCard} className={slotCardClass} onClick={() => handleSlotCardClick(idx)} /> : <Card isPlaceholder={true} className={slotCardClass} />}

                                                    <div 
                                                        onClick={() => toggleEndBracket(idx)} 
                                                        className={`absolute -right-4 sm:-right-5 top-1/2 -translate-y-1/2 z-30 w-8 h-full flex items-center justify-center cursor-pointer select-none transition-all duration-200 ${endBrackets[idx] > 0 ? 'text-yellow-400 font-black text-4xl sm:text-5xl scale-110' : 'text-white/40 font-bold text-2xl sm:text-3xl'}`}
                                                        style={{ textShadow: endBrackets[idx] > 0 ? '2px 2px 0 #1e293b, -1.5px -1.5px 0 #1e293b, 1.5px -1.5px 0 #1e293b, -1.5px 1.5px 0 #1e293b, 0 4px 8px rgba(0,0,0,0.8)' : '1px 1px 2px rgba(0,0,0,0.8)' }}
                                                    >
                                                        {endBrackets[idx] === 1 ? ')' : endBrackets[idx] === 2 ? '))' : ')'}
                                                    </div>
                                                </div>

                                                {/* 연산자 세로로 4개 배치 (가로폭 절약을 위해 크기 최적화) */}
                                                {idx < 3 && (
                                                    <div className="relative z-[40] flex flex-col items-center justify-center mx-1 sm:mx-1.5 gap-1">
                                                        {OPERATORS.map(op => (
                                                            <button 
                                                                key={op}
                                                                onClick={(e) => { 
                                                                    e.stopPropagation(); 
                                                                    selectOperator(idx, op); 
                                                                }}
                                                                className={`w-6 h-6 sm:w-8 sm:h-8 rounded-md flex items-center justify-center font-black text-sm sm:text-base transition-all duration-150 ${
                                                                    operators[idx] === op 
                                                                    ? OPERATOR_STYLES[op] + ' scale-110 ring-2 ring-white/50 z-10' 
                                                                    : OPERATOR_STYLES_INACTIVE[op] + ' hover:scale-105 opacity-60 hover:opacity-100'
                                                                }`}
                                                            >
                                                                {OPERATOR_DISPLAY[op]}
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </div>
                                    
                                    {/* 힌트 및 결과 메시지 출력 (긴 힌트를 위해 min-h 수정) */}
                                    <div className="mt-6 flex flex-col items-center justify-center px-4">
                                        <div className={`text-center leading-tight min-h-[1.25rem] h-auto mb-2 ${gameState === 'success' ? 'text-emerald-300' : gameState === 'fail' ? 'text-red-400' : 'text-emerald-200'}`}>
                                            {resultMessage ? <span className="text-sm font-bold drop-shadow-md break-keep">{resultMessage}</span> : <span className="text-xs text-emerald-400/50 font-medium">{t('place_cards')}</span>}
                                        </div>
                                    </div>
                                </div>

                                {/* 3. 하단 액션 & 아이템 바 */}
                                <div className={`flex flex-col gap-4 p-4 pb-8 pt-4 bg-emerald-900 border-t border-emerald-800/50`}>
                                    {/* 가로형 아이템 배치 */}
                                    {(gameState === 'playing' || gameState === 'tutorial') && !isPaused && (
                                        <div className="flex justify-center gap-6 sm:gap-8 w-full max-w-sm mx-auto mb-2">
                                            <button onClick={useTimeItem} disabled={timeItemsLeft === 0} className="flex flex-col items-center group">
                                                <div className={`w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center rounded-2xl border-2 shadow-lg transition-transform active:scale-90 ${timeItemsLeft > 0 ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-500'}`}>
                                                    <ClockPlus size={28} />
                                                </div>
                                                <div className="mt-2 text-center leading-tight">
                                                    <span className="text-xs font-bold text-slate-300 block mb-0.5">{t('time')}</span>
                                                    <span className={`text-lg font-black ${timeItemsLeft > 0 ? 'text-indigo-300' : 'text-slate-500'}`}>{timeItemsLeft}</span>
                                                </div>
                                            </button>
                                            <button onClick={useHint} disabled={hintsLeft === 0} className="flex flex-col items-center group">
                                                <div className={`w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center rounded-2xl border-2 shadow-lg transition-transform active:scale-90 ${hintsLeft > 0 ? 'bg-yellow-600 border-yellow-400 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-500'}`}>
                                                    <Lightbulb size={28} />
                                                </div>
                                                <div className="mt-2 text-center leading-tight">
                                                    <span className="text-xs font-bold text-slate-300 block mb-0.5">{t('hint')}</span>
                                                    <span className={`text-lg font-black ${hintsLeft > 0 ? 'text-yellow-300' : 'text-slate-500'}`}>{hintsLeft}</span>
                                                </div>
                                            </button>
                                            <button onClick={usePassItem} disabled={passItemsLeft === 0} className="flex flex-col items-center group">
                                                <div className={`w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center rounded-2xl border-2 shadow-lg transition-transform active:scale-90 ${passItemsLeft > 0 ? 'bg-rose-600 border-rose-400 text-white' : 'bg-slate-700/50 border-slate-600 text-slate-500'}`}>
                                                    <FastForward size={28} />
                                                </div>
                                                <div className="mt-2 text-center leading-tight">
                                                    <span className="text-xs font-bold text-slate-300 block mb-0.5">{t('pass')}</span>
                                                    <span className={`text-lg font-black ${passItemsLeft > 0 ? 'text-rose-300' : 'text-slate-500'}`}>{passItemsLeft}</span>
                                                </div>
                                            </button>
                                        </div>
                                    )}

                                    {/* 메인 확인/다음 버튼 */}
                                    <div className="flex justify-center w-full max-w-sm mx-auto">
                                        {(gameState === 'playing' || gameState === 'tutorial') ? (
                                            <button onClick={checkResult} disabled={isPaused} className="w-full py-3.5 bg-emerald-600 active:bg-emerald-700 disabled:opacity-50 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-2 border border-emerald-400/30">
                                                <CheckCircle size={20} /> {t('check_answer')}
                                            </button>
                                        ) : null}
                                        
                                        {gameState === 'success' && (
                                            <button onClick={nextProblem} className="w-full py-3.5 bg-blue-600 active:bg-blue-700 text-white font-bold text-lg rounded-2xl shadow-xl animate-bounce flex items-center justify-center gap-2">
                                                {tutorialPhase > 0 ? (tutorialPhase === 5 ? t('tutorial_complete') : t('next_problem')) : t('next_problem')} <Play size={20} fill="currentColor" />
                                            </button>
                                        )}
                                        {gameState === 'fail' && (
                                            <button onClick={restartGame} disabled={energy < 1} className={`w-full py-3.5 text-white font-bold text-lg rounded-2xl shadow-xl flex items-center justify-center gap-2 ${energy >= 1 ? 'bg-slate-600 active:bg-slate-500' : 'bg-slate-700 opacity-50 cursor-not-allowed'}`}>
                                                <RotateCcw size={20} /> {energy >= 1 ? t('restart') : t('not_enough_energy')}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Make24Game />);
    </script>
</body>
</html>
